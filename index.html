<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowManager PRO - Plant Lifecycle</title>
    <style>
        :root { --primary: #2e7d32; --secondary: #0288d1; --accent: #546e7a; --bg: #f0f2f5; --card: #ffffff; --error: #d32f2f; --success: #388e3c; --neutral: #757575; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 10px; margin: 0; direction: rtl; }
        .container { max-width: 650px; margin: auto; }
        .nav-bar { display: flex; background: var(--card); border-radius: 15px; margin-bottom: 20px; padding: 5px; gap: 5px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow-x: auto; }
        .nav-item { flex: 1; min-width: 80px; padding: 12px 5px; text-align: center; cursor: pointer; font-weight: bold; font-size: 12px; border-radius: 10px; color: #666; transition: 0.3s; }
        .nav-item.active { background: var(--primary); color: white; }
        .panel { display: none; }
        .panel.active { display: block; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin: 0 0 15px 0; font-size: 1.2rem; color: var(--primary); border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        h3 { margin: 10px 0; font-size: 1rem; color: var(--primary); }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 11px; color: #777; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; margin-bottom: 10px; font-size: 15px; background: #fafafa; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .selector { display: flex; gap: 5px; margin-bottom: 10px; }
        .opt { flex: 1; padding: 8px; background: #f8f8f8; border: 2px solid #eee; border-radius: 8px; text-align: center; cursor: pointer; font-size: 12px; }
        .opt.active-opt { border-color: var(--primary); background: #e8f5e9; font-weight: bold; }
        .limits-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; background: #f9f9f9; padding: 10px 5px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; }
        .limits-grid input { padding: 5px; margin-bottom: 0; font-size: 9px; text-align: center; }
        .main-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; color: white; font-size: 16px; }
        .main-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .entry { padding: 15px; border-radius: 12px; margin-bottom: 10px; position: relative; background: white; border-right: 6px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .type-seed { border-right-color: var(--primary); } 
        .type-hydro { border-right-color: var(--secondary); } 
        .type-water { border-right-color: var(--accent); }
        .cam-box { background: #f0f0f0; border: 2px dashed #ccc; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; margin-bottom: 10px; }
        .status-tag { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; color: white; margin-top: 5px; margin-left: 5px; }
        .tag-early { background: var(--success); } 
        .tag-late { background: var(--error); } 
        .tag-ontime { background: var(--secondary); }
        .tag-moved { background: #673ab7; } 
        .tag-harvested { background: #ff9800; } 
        .tag-dead { background: #212121; }
        .tag-count { background: #795548; }
        .hidden { display: none; }
        .search-box { background: #f1f8e9; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #c8e6c9; }
        .status-btn-group { display: flex; gap: 5px; margin-top: 10px; }
        .status-btn { flex: 1; padding: 5px; font-size: 10px; border-radius: 5px; border: 1px solid #ddd; cursor: pointer; background: #fff; }
        .status-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .charts-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .charts-container { grid-template-columns: 1fr; } }
        .plant-dropdown { position: relative; }
        .plant-options { display: none; position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; border-radius: 10px; max-height: 200px; overflow-y: auto; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .plant-options.show { display: block; }
        .plant-option { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .plant-option:hover { background: #f5f5f5; }
        .plant-option.selected { background: #e8f5e9; font-weight: bold; }
        .tips-box { background: #fff3e0; border-right: 4px solid #ff9800; padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 12px; }
        .tips-box h4 { margin: 0 0 8px 0; color: #ff9800; }
        .tips-box ul { margin: 5px 0; padding-right: 20px; }
        .tips-box li { margin: 3px 0; }
        .danger-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; color: white; font-size: 16px; background: var(--error); margin-top: 20px; }
        .img-preview { max-width: 100%; max-height: 150px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; }
        .hydro-plant-dropdown { position: relative; }
        .hydro-plant-options { display: none; position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; border-radius: 10px; max-height: 200px; overflow-y: auto; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hydro-plant-options.show { display: block; }
        .hydro-plant-option { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .hydro-plant-option:hover { background: #f5f5f5; }
        .seed-header { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .seed-header-field { display: flex; flex-direction: column; }
        .seed-header-field label { margin-bottom: 5px; }
        .seed-header-field input { margin-bottom: 0; }
        .hole-range-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .hole-range-wrapper-field { display: flex; flex-direction: column; }
        .hole-range-wrapper-field label { margin-bottom: 5px; }
        .hole-range-wrapper-field input { margin-bottom: 0; }
        .source-dropdown { position: relative; }
        .source-options { display: none; position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; border-radius: 10px; max-height: 150px; overflow-y: auto; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .source-options.show { display: block; }
        .source-option { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 12px; }
        .source-option:hover { background: #f5f5f5; }
        .info-box { background: #e3f2fd; border-right: 4px solid var(--secondary); padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 12px; color: #1565c0; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <div id="navSeed" class="nav-item active" onclick="showPanel('seedPanel', this)">🌱 זריעה</div>
        <div id="navHydro" class="nav-item" onclick="showPanel('hydroPanel', this)">💧 הידרו</div>
        <div id="navData" class="nav-item" onclick="showPanel('dataPanel', this)">📊 מדדים</div>
        <div id="navHistory" class="nav-item" onclick="showPanel('historyPanel', this)">🔍 חיפוש</div>
        <div id="navReport" class="nav-item" onclick="showPanel('reportPanel', this)">🗂️ כרטיסיות</div>
    </div>

    <div id="seedPanel" class="panel active">
        <div class="card">
            <h2>🌱 יומן זריעה וצפי הצצה</h2>
            <label>סוג מצע:</label>
            <div class="selector">
                <div class="opt" id="typePlast" onclick="setSubstrate('מגשי פלסטיק')">מגשי פלסטיק</div>
                <div class="opt" id="typeRock" onclick="setSubstrate('צמר סלעים')">צמר סלעים</div>
                <div class="opt" id="typePots" onclick="setSubstrate('עציצי פלסטיק')">עציצי פלסטיק</div>
            </div>

            <div class="seed-header">
                <div class="seed-header-field">
                    <label>מחזור</label>
                    <input type="text" id="sCycle" value="1">
                </div>
                <div class="seed-header-field">
                    <label id="lblTray">מגש</label>
                    <input type="text" id="sTray" value="1">
                </div>
                <div class="seed-header-field">
                    <label id="lblRow">שורה</label>
                    <input type="text" id="sRow">
                </div>
                <div class="seed-header-field">
                    <label id="lblCol">עמודה</label>
                    <input type="text" id="sCol">
                </div>
            </div>

            <div class="hole-range-wrapper">
                <div class="hole-range-wrapper-field">
                    <label>מי גומה מספר</label>
                    <input type="text" id="sHoleFrom" oninput="calcPlantCount()">
                </div>
                <div class="hole-range-wrapper-field">
                    <label>עד גומה מספר</label>
                    <input type="text" id="sHoleTo" oninput="calcPlantCount()">
                </div>
            </div>

            <div id="plantCountDisplay" class="info-box" style="display:none;"></div>

            <div class="selector">
                <div class="opt active-opt" id="catVeg" onclick="setCat('veg')">ירקות</div>
                <div class="opt" id="catFlo" onclick="setCat('flo')">פרחים</div>
                <div class="opt" id="catMan" onclick="setCat('man')">ידני</div>
            </div>
            <div class="grid-4">
                <div>
                    <label>שם הצמח:</label>
                    <select id="sPlantVeg" onchange="updateGerm()"></select>
                    <select id="sPlantFlo" class="hidden" onchange="updateGerm()"></select>
                    <input type="text" id="sPlantMan" class="hidden" placeholder="שם הצמח...">
                </div>
                <div><label>תאריך זריעה:</label><input type="date" id="sDate"></div>
                <div><label>ימי הצצה:</label><input type="number" id="sGermTarget" readonly></div>
                <div><label>נביטה בפועל:</label><input type="date" id="sGermActual"></div>
            </div>
            <div id="tipsArea"></div>
            <div class="cam-box" onclick="document.getElementById('sFile').click()">📸 לחץ לצילום</div>
            <input type="file" id="sFile" accept="image/*" capture="environment" class="hidden" onchange="compressImg(this)">
            <img id="sPreview" class="img-preview" style="display:none;">
            <textarea id="sNotes" placeholder="הערות..."></textarea>
            <button id="btnSaveSeed" class="main-btn" style="background:var(--primary)" onclick="saveData('seed')">שמור זריעה</button>
        </div>
    </div>

    <div id="hydroPanel" class="panel">
        <div class="card">
            <h2>💧 שתילה במערכת</h2>
            <div class="selector">
                <div class="opt active-opt" id="side1" onclick="setSide(1)">צד 1</div>
                <div class="opt" id="side2" onclick="setSide(2)">צד 2</div>
            </div>
            <div class="grid-2">
                <div><label>שורה:</label><input type="number" id="hRow"></div>
                <div><label>חור:</label><input type="number" id="hHole"></div>
            </div>
            <label>שם הצמח:</label>
            <div class="hydro-plant-dropdown">
                <input type="text" id="hPlant" placeholder="חפש או בחר שם צמח..." onkeyup="filterHydroPlants()">
                <div id="hydroPlantDropdown" class="hydro-plant-options"></div>
            </div>
            <label>מקור השתיל:</label>
            <div class="source-dropdown">
                <input type="text" id="hSource" placeholder="בחר מקור (מחזור/מגש/שורה/עמודה/גומה)..." onkeyup="filterSources()" readonly style="cursor:pointer;">
                <div id="sourceDropdown" class="source-options"></div>
            </div>
            <input type="date" id="hDate">
            <textarea id="hNotes" placeholder="הערות שתילה..."></textarea>
            <button id="btnSaveHydro" class="main-btn" style="background:var(--secondary)" onclick="saveData('hydro')">שמור שתילה</button>
        </div>
    </div>

    <div id="dataPanel" class="panel">
        <div class="card">
            <h2>📊 מדדים וגבולות</h2>
            <div class="limits-grid">
                <div><label>Min pH</label><input type="number" step="0.1" id="mPhMin" value="5.5"></div>
                <div><label>Max pH</label><input type="number" step="0.1" id="mPhMax" value="6.5"></div>
                <div><label>Min EC</label><input type="number" step="0.1" id="mEcMin" value="1.2"></div>
                <div><label>Max EC</label><input type="number" step="0.1" id="mEcMax" value="2.2"></div>
                <div><label>Min T°</label><input type="number" id="mTmMin" value="18"></div>
                <div><label>Max T°</label><input type="number" id="mTmMax" value="26"></div>
                <div><label>Min DO</label><input type="number" id="mDoMin" value="5"></div>
                <div><label>Max DO</label><input type="number" id="mDoMax" value="10"></div>
            </div>
            <label>תאריך מדידה:</label>
            <input type="date" id="wDate">
            <div class="grid-2">
                <input type="number" step="0.1" id="wPH" placeholder="pH" oninput="checkLim()">
                <input type="number" step="0.1" id="wEC" placeholder="EC" oninput="checkLim()">
                <input type="number" id="wTemp" placeholder="טמפ'" oninput="checkLim()">
                <input type="number" step="0.1" id="wDO" placeholder="DO (חמצן)" oninput="checkLim()">
            </div>
            <button id="btnSaveWater" class="main-btn" style="background:var(--accent)" onclick="saveData('water')">שמור מדדים</button>
        </div>

        <div class="card">
            <h3>📈 גרף pH</h3>
            <canvas id="phChart" width="400" height="200"></canvas>
        </div>

        <div class="card">
            <h3>📈 גרף EC</h3>
            <canvas id="ecChart" width="400" height="200"></canvas>
        </div>

        <div class="card">
            <h3>📈 גרף טמפרטורה</h3>
            <canvas id="tempChart" width="400" height="200"></canvas>
        </div>

        <div class="card">
            <h3>📈 גרף DO (חמצן)</h3>
            <canvas id="doChart" width="400" height="200"></canvas>
        </div>
    </div>

    <div id="historyPanel" class="panel">
        <div class="card">
            <h2>🔍 חיפוש מתקדם</h2>
            <div class="search-box">
                <label>חפש צמח:</label>
                <div class="plant-dropdown">
                    <input type="text" id="qPlant" placeholder="חפש או בחר שם צמח..." onkeyup="filterPlants()">
                    <div id="plantDropdown" class="plant-options"></div>
                </div>
                <div class="grid-4">
                    <input type="text" id="qTray" placeholder="מגש" oninput="refreshAll()">
                    <input type="text" id="qRowS" placeholder="שורה" oninput="refreshAll()">
                    <input type="text" id="qColS" placeholder="עמודה" oninput="refreshAll()">
                    <input type="text" id="qHoleS" placeholder="גומה" oninput="refreshAll()">
                </div>
                <div class="grid-3">
                    <input type="number" id="qSide" placeholder="צד" oninput="refreshAll()">
                    <input type="number" id="qRowH" placeholder="שורה" oninput="refreshAll()">
                    <input type="number" id="qHole" placeholder="חור" oninput="refreshAll()">
                </div>
            </div>
            <div id="historyList"></div>
        </div>
    </div>

    <div id="reportPanel" class="panel">
        <div class="card">
            <h2>🗂️ כרטיסיות צמחים</h2>
            <div id="reportList"></div>
            <button onclick="exportCSV()" class="main-btn" style="background:var(--secondary); margin-top:20px;">📊 ייצוא לאקסל (CSV)</button>
            <button onclick="exportWithImages()" class="main-btn" style="background:#1976d2; margin-top:10px;">📸 ייצוא עם תמונות (ZIP)</button>
            <button onclick="confirmDeleteAll()" class="danger-btn">🗑️ מחק את כל ההיסטוריה</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
    const plants = { 
         veg: [
            {n:"חסה", d:3, tips:{זריעה:["הכנה: אל תחמם זרעים מעל 20°C", "שטוף זרעים במים קרים לפני זריעה", "שימוש בזרעים טרים בעדיפות", "זריעה בעומק 0.5 ס\"מ", "שמור לחות קבועה", "טמפ' אופטימלית 18-22°C"], גידול:["אור 14-16 שעות ביום", "הימנע מ-יבול צמוד יתר", "קצור לאחר 3-4 שבועות"]}},
            {n:"עגבניה", d:7, tips:{זריעה:["הכנה: שרה זרעים ב-80°C למשך 25 דקות להשמדת מחלות", "קח זרעים מפרי עגבניה בשל בלבד", "ייבוש הזרעים כראוי לפני אחסון", "זריעה עמוקה 0.5 ס\"מ", "חום ועקביות לחות", "בדיקת נביטה יום 3-7"], גידול:["אור חזק 16+ שעות", "תמיכה בצמחים", "קצור פירות בשלים"]}},
            {n:"בזיליקום", d:5, tips:{זריעה:["הכנה: השרה זרעים 12 שעות במים לפני זריעה", "לא להחזיק זרעים בחום מעל 25°C בטווח ארוך", "זריעה שטחית", "טמפ' חמה (21-27°C)", "הימנע מהצטברות מים"], גידול:["קטיפת הדרכים לצפיפות", "הפרחה מאוחרת", "אריסה רציפה"]}},
            {n:"מלפפון", d:4, tips:{זריעה:["הכנה: טבל זרעים בתמיסת תופחי בעדיפות", "בדוק זרעים לשלמות (ללא סדקים)", "משוך זרעים חלשים ודקים", "זריעה בעומק 1-2 ס\"מ", "מצע חם ועיר", "טמפ' מינימום 20°C"], גידול:["תמיכה וקשירה", "הרטבה שוטפת", "קצור בטרי צעיר"]}},
            {n:"פלפל", d:10, tips:{זריעה:["הכנה: בדוק ישנות זרעים - זרעים ישנים לא ינובטו", "השרה זרעים ב-50°C למשך 30 דקות", "תן להם להתחזק בחום רטוב", "זריעה עמוקה 0.5-1 ס\"מ", "גבוה חום", "סבלנות בנביטה"], גידול:["אור חזק כל היום", "טמפ' יציבה", "קצור בעדיפות הדרגתית"]}},
            {n:"קישוא", d:5, tips:{זריעה:["הכנה: אחסון בטמפ' 25-30°C לפני זריעה", "ודא שזרעים שלמים ללא שחיקה", "השרה 2 שעות במים חמים בהעדפה", "זריעה בעומק 1-2 ס\"מ", "מצע חם", "כל 2-3 זרעים בחור"], גידול:["הרטבה עובי", "דליקה בבלוטות", "קטיפת קצוות"]}},
            {n:"גזר", d:14, tips:{זריעה:["הכנה: קח זרעים מקופסא טרית בלבד", "זרעים ישנים עלולים להיות בעלי שיעור נביטה נמוך", "טבל בתמיסה לשיפור נביטה", "זריעה שטחית מאד", "לא לשכוח בתקופת נביטה", "סדה קלה"], גידול:["תדירות הרטבה", "דקות בניתור", "קצור לאחר 60-80 יום"]}},

    let db = JSON.parse(localStorage.getItem('growData')) || [];
    let activeImg = "", currentCat = 'veg', currentSide = 1, currentSubstrate = '', editId = null;
    let charts = { ph: null, ec: null, temp: null, do: null };
    let allPlantsForDropdown = [];

    window.onload = () => {
        const v = document.getElementById('sPlantVeg'), f = document.getElementById('sPlantFlo');
        if(v && f) {
            plants.veg.forEach(p => v.innerHTML += `<option value="${p.n}">${p.n}</option>`);
            plants.flo.forEach(p => f.innerHTML += `<option value="${p.n}">${p.n}</option>`);
        }
        document.querySelectorAll('input[type="date"]').forEach(i => i.valueAsDate = new Date());
        updateGerm(); 
        refreshAll(); 
        updateCharts(); 
        initPlantDropdown();
        initHydroPlantDropdown();
    };

    function initPlantDropdown() {
        allPlantsForDropdown = [...plants.veg, ...plants.flo].map(p => p.n).filter((v, i, a) => a.indexOf(v) === i).sort();
        document.getElementById('qPlant').addEventListener('blur', () => {
            setTimeout(() => {
                document.getElementById('plantDropdown').classList.remove('show');
            }, 200);
        });
    }

    function initHydroPlantDropdown() {
        document.getElementById('hPlant').addEventListener('blur', () => {
            setTimeout(() => {
                document.getElementById('hydroPlantDropdown').classList.remove('show');
            }, 200);
        });
        document.getElementById('hSource').addEventListener('focus', () => {
            filterSources();
        });
    }

    function filterPlants() {
        const input = document.getElementById('qPlant').value.toLowerCase();
        const dropdown = document.getElementById('plantDropdown');
        
        if(input.length === 0) {
            dropdown.classList.remove('show');
            refreshAll();
            return;
        }

        const filtered = allPlantsForDropdown.filter(p => p.toLowerCase().includes(input));
        dropdown.innerHTML = filtered.map(p => `<div class="plant-option" onclick="selectPlantFromDropdown('${p}')">${p}</div>`).join('');
        dropdown.classList.add('show');
    }

    function selectPlantFromDropdown(plant) {
        document.getElementById('qPlant').value = plant;
        document.getElementById('plantDropdown').classList.remove('show');
        refreshAll();
    }

    function filterHydroPlants() {
        const input = document.getElementById('hPlant').value.toLowerCase();
        const dropdown = document.getElementById('hydroPlantDropdown');
        
        if(input.length === 0) {
            dropdown.classList.remove('show');
            return;
        }

        const filtered = allPlantsForDropdown.filter(p => p.toLowerCase().includes(input));
        dropdown.innerHTML = filtered.map(p => `<div class="hydro-plant-option" onclick="selectHydroPlant('${p}')">${p}</div>`).join('');
        dropdown.classList.add('show');
    }

    function selectHydroPlant(plant) {
        document.getElementById('hPlant').value = plant;
        document.getElementById('hydroPlantDropdown').classList.remove('show');
        filterSources();
    }

    function filterSources() {
        const plantName = document.getElementById('hPlant').value;
        if(!plantName) {
            document.getElementById('sourceDropdown').classList.remove('show');
            return;
        }

        const seedEntries = db.filter(e => e.type === 'seed' && e.plant === plantName && !e.lifecycle);
        const dropdown = document.getElementById('sourceDropdown');
        
        if(seedEntries.length === 0) {
            dropdown.innerHTML = '<div class="source-option" style="color:red;">אין שתילים זמינים מצמח זה</div>';
            dropdown.classList.add('show');
            return;
        }

        dropdown.innerHTML = seedEntries.map(e => {
            let sourceStr = '';
            if(e.substrate === 'עציצי פלסטיק') {
                sourceStr = e.rawLoc.holeFrom || e.rawLoc.hole;
            } else {
                sourceStr = `${e.rawLoc.cycle}/${e.rawLoc.tray}/${e.rawLoc.row}/${e.rawLoc.col}/${e.rawLoc.holeFrom || e.rawLoc.hole}`;
            }
            return `<div class="source-option" onclick="selectSource('${e.id}', '${sourceStr}')">${sourceStr}</div>`;
        }).join('');
        dropdown.classList.add('show');
    }

    function selectSource(seedId, sourceStr) {
        document.getElementById('hSource').value = sourceStr;
        document.getElementById('hSource').dataset.seedId = seedId;
        document.getElementById('sourceDropdown').classList.remove('show');
    }

    function calcPlantCount() {
        const holeFrom = parseInt(document.getElementById('sHoleFrom').value);
        const holeTo = parseInt(document.getElementById('sHoleTo').value);
        const substrate = currentSubstrate;
        
        if(!substrate) return;

        let count = 0;
        if(substrate === 'עציצי פלסטיק') {
            count = 1;
        } else {
            if(!isNaN(holeFrom) && !isNaN(holeTo) && holeTo >= holeFrom) {
                count = holeTo - holeFrom + 1;
            } else if(!isNaN(holeFrom) && isNaN(holeTo)) {
                count = 1;
            }
        }

        const display = document.getElementById('plantCountDisplay');
        if(count > 0) {
            display.innerHTML = `📊 כמות צמחים בזריעה: <strong>${count}</strong> צמחים`;
            display.style.display = 'block';
        } else {
            display.style.display = 'none';
        }
    }

    function updateCharts() {
        let phData = [], ecData = [], tempData = [], doData = [], labels = [];
        let waterEntries = db.filter(e => e.type === 'water').sort((a, b) => new Date(a.date) - new Date(b.date));
        
        waterEntries.forEach(entry => {
            if(entry.wPH !== undefined) phData.push(entry.wPH);
            if(entry.wEC !== undefined) ecData.push(entry.wEC);
            if(entry.wTemp !== undefined) tempData.push(entry.wTemp);
            if(entry.wDO !== undefined) doData.push(entry.wDO);
            labels.push(new Date(entry.date).toLocaleDateString('he-IL'));
        });

        const chartConfig = {
            responsive: true,
            maintainAspectRatio: true,
            scales: {
                y: { beginAtZero: true }
            },
            plugins: {
                legend: { labels: { font: { size: 12 } } }
            }
        };

        const phCtx = document.getElementById('phChart').getContext('2d');
        if(charts.ph) charts.ph.destroy();
        charts.ph = new Chart(phCtx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'pH',
                    data: phData,
                    borderColor: 'rgba(255, 99, 132, 1)',
                    backgroundColor: 'rgba(255, 99, 132, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: chartConfig
        });

        const ecCtx = document.getElementById('ecChart').getContext('2d');
        if(charts.ec) charts.ec.destroy();
        charts.ec = new Chart(ecCtx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'EC',
                    data: ecData,
                    borderColor: 'rgba(54, 162, 235, 1)',
                    backgroundColor: 'rgba(54, 162, 235, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: chartConfig
        });

        const tempCtx = document.getElementById('tempChart').getContext('2d');
        if(charts.temp) charts.temp.destroy();
        charts.temp = new Chart(tempCtx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'טמפרטורה (°C)',
                    data: tempData,
                    borderColor: 'rgba(75, 192, 192, 1)',
                    backgroundColor: 'rgba(75, 192, 192, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: chartConfig
        });

        const doCtx = document.getElementById('doChart').getContext('2d');
        if(charts.do) charts.do.destroy();
        charts.do = new Chart(doCtx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'DO (חמצן מומס)',
                    data: doData,
                    borderColor: 'rgba(75, 192, 75, 1)',
                    backgroundColor: 'rgba(75, 192, 75, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: chartConfig
        });
    }

    function showPanel(id, el) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active'); 
        el.classList.add('active');
        
        setTimeout(() => {
            if(id === 'seedPanel') {
                resetEditMode('seed');
            } else if(id === 'hydroPanel') {
                resetEditMode('hydro');
            } else if(id === 'dataPanel') {
                resetEditMode('water');
                updateCharts();
            } else {
                refreshAll();
            }
        }, 100);
    }

    function setSubstrate(type) {
        currentSubstrate = type;
        document.getElementById('typePlast').classList.toggle('active-opt', type === 'מגשי פלסטיק');
        document.getElementById('typeRock').classList.toggle('active-opt', type === 'צמר סלעים');
        document.getElementById('typePots').classList.toggle('active-opt', type === 'עציצי פלסטיק');
        const fields = ['sTray', 'sRow', 'sCol'];
        const lblTray = document.getElementById('lblTray');
        if(type === 'עציצי פלסטיק') {
            fields.forEach(id => { const el = document.getElementById(id); el.value = 'לא רלוונטי'; el.style.backgroundColor = '#e0e0e0'; });
            lblTray.innerText = 'עציץ מספר:';
        } else {
            fields.forEach(id => { const el = document.getElementById(id); if(el.value === 'לא רלוונטי') el.value = '1'; el.style.backgroundColor = '#fafafa'; });
            lblTray.innerText = 'מגש';
        }
        calcPlantCount();
    }

    function setCat(c) {
        currentCat = c;
        document.getElementById('catVeg').classList.toggle('active-opt', c === 'veg');
        document.getElementById('catFlo').classList.toggle('active-opt', c === 'flo');
        document.getElementById('catMan').classList.toggle('active-opt', c === 'man');
        document.getElementById('sPlantVeg').classList.toggle('hidden', c !== 'veg');
        document.getElementById('sPlantFlo').classList.toggle('hidden', c !== 'flo');
        document.getElementById('sPlantMan').classList.toggle('hidden', c !== 'man');
        updateGerm();
    }

    function setSide(s) { 
        currentSide = s; 
        document.getElementById('side1').classList.toggle('active-opt', s===1); 
        document.getElementById('side2').classList.toggle('active-opt', s===2); 
    }

    function updateGerm() {
        if(currentCat === 'man') {
            document.getElementById('sGermTarget').value = '';
            document.getElementById('tipsArea').innerHTML = '';
            return;
        }
        const sel = currentCat === 'veg' ? 'sPlantVeg' : 'sPlantFlo';
        const selectedPlantName = document.getElementById(sel).value;
        const p = plants[currentCat].find(x => x.n === selectedPlantName);
        if(p) {
            document.getElementById('sGermTarget').value = p.d;
            displayTips(p);
        } else {
            document.getElementById('tipsArea').innerHTML = '';
        }
    }

    function displayTips(plant) {
        let tipsHTML = '<div class="tips-box"><h4>💡 טיפים לצמח: ' + plant.n + '</h4>';
        tipsHTML += '<strong>זריעה (הכנת זרעים וביצוע):</strong><ul>';
        if(plant.tips.זריעה) {
            plant.tips.זריעה.forEach(tip => tipsHTML += '<li>' + tip + '</li>');
        }
        tipsHTML += '</ul><strong>גידול ותחזוקה:</strong><ul>';
        if(plant.tips.גידול) {
            plant.tips.גידול.forEach(tip => tipsHTML += '<li>' + tip + '</li>');
        }
        tipsHTML += '</ul></div>';
        document.getElementById('tipsArea').innerHTML = tipsHTML;
    }

    function checkLim() {
        const checks = [{v:'wPH', min:'mPhMin', max:'mPhMax'}, {v:'wEC', min:'mEcMin', max:'mEcMax'}, {v:'wTemp', min:'mTmMin', max:'mTmMax'}, {v:'wDO', min:'mDoMin', max:'mDoMax'}];
        checks.forEach(c => {
            const el = document.getElementById(c.v), val = parseFloat(el.value);
            const min = parseFloat(document.getElementById(c.min).value), max = parseFloat(document.getElementById(c.max).value);
            if(el) el.style.backgroundColor = (!isNaN(val) && (val < min || val > max)) ? "#ffebee" : "#fafafa";
        });
    }

    function compressImg(input) {
        if (!input.files || !input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX = 400; 
                const scale = MAX / img.width;
                canvas.width = MAX; 
                canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                activeImg = canvas.toDataURL('image/jpeg', 0.7);
                document.getElementById('sPreview').src = activeImg; 
                document.getElementById('sPreview').style.display = 'block';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function clearSeedForm() {
        document.getElementById('sCycle').value = '1';
        document.getElementById('sTray').value = '1';
        document.getElementById('sRow').value = '';
        document.getElementById('sCol').value = '';
        document.getElementById('sHoleFrom').value = '';
        document.getElementById('sHoleTo').value = '';
        document.getElementById('sDate').valueAsDate = new Date();
        document.getElementById('sGermTarget').value = '';
        document.getElementById('sGermActual').value = '';
        document.getElementById('sNotes').value = '';
        document.getElementById('sPreview').style.display = 'none';
        document.getElementById('plantCountDisplay').style.display = 'none';
        activeImg = '';
        document.getElementById('sFile').value = '';
        resetEditMode('seed');
    }

    function clearHydroForm() {
        setSide(1);
        document.getElementById('hRow').value = '';
        document.getElementById('hHole').value = '';
        document.getElementById('hPlant').value = '';
        document.getElementById('hSource').value = '';
        document.getElementById('hSource').dataset.seedId = '';
        document.getElementById('hDate').valueAsDate = new Date();
        document.getElementById('hNotes').value = '';
        resetEditMode('hydro');
    }

    function clearWaterForm() {
        document.getElementById('wDate').valueAsDate = new Date();
        document.getElementById('wPH').value = '';
        document.getElementById('wEC').value = '';
        document.getElementById('wTemp').value = '';
        document.getElementById('wDO').value = '';
        resetEditMode('water');
    }

    function editEntry(id) {
        const item = db.find(i => i.id === id);
        if(!item) return;
        editId = id;
        if(item.type === 'seed') {
            showPanel('seedPanel', document.getElementById('navSeed'));
            setSubstrate(item.substrate);
            document.getElementById('sCycle').value = item.rawLoc.cycle;
            document.getElementById('sTray').value = item.rawLoc.tray;
            document.getElementById('sRow').value = item.rawLoc.row;
            document.getElementById('sCol').value = item.rawLoc.col;
            document.getElementById('sHoleFrom').value = item.rawLoc.holeFrom || item.rawLoc.hole;
            document.getElementById('sHoleTo').value = item.rawLoc.holeTo || '';
            document.getElementById('sDate').value = item.date;
            document.getElementById('sGermTarget').value = item.germ ? item.germ.target : '';
            document.getElementById('sGermActual').value = item.germActualDate || '';
            document.getElementById('sNotes').value = item.notes;
            if(item.img) { 
                activeImg = item.img; 
                document.getElementById('sPreview').src = item.img; 
                document.getElementById('sPreview').style.display = 'block'; 
            }
            calcPlantCount();
            document.getElementById('btnSaveSeed').innerText = "עדכן נתונים";
        } else if(item.type === 'hydro') {
            showPanel('hydroPanel', document.getElementById('navHydro'));
            setSide(item.rawLoc.side);
            document.getElementById('hRow').value = item.rawLoc.row;
            document.getElementById('hHole').value = item.rawLoc.hole;
            document.getElementById('hPlant').value = item.plant;
            document.getElementById('hSource').value = item.rawLoc.sourceStr || '';
            document.getElementById('hSource').dataset.seedId = item.rawLoc.sourceId || '';
            document.getElementById('hDate').value = item.date;
            document.getElementById('hNotes').value = item.notes;
            document.getElementById('btnSaveHydro').innerText = "עדכן נתונים";
        } else if(item.type === 'water') {
            showPanel('dataPanel', document.getElementById('navData'));
            document.getElementById('wDate').value = item.date;
            document.getElementById('wPH').value = item.wPH || '';
            document.getElementById('wEC').value = item.wEC || '';
            document.getElementById('wTemp').value = item.wTemp || '';
            document.getElementById('wDO').value = item.wDO || '';
            document.getElementById('btnSaveWater').innerText = "עדכן מדדים";
        }
    }

    function resetEditMode(type) {
        editId = null;
        if(type==='seed') { 
            document.getElementById('btnSaveSeed').innerText = "שמור זריעה"; 
        }
        if(type==='hydro') { 
            document.getElementById('btnSaveHydro').innerText = "שמור שתילה"; 
        }
        if(type==='water') { 
            document.getElementById('btnSaveWater').innerText = "שמור מדדים"; 
        }
    }

    function saveData(type) {
        let entry = editId ? db.find(i => i.id === editId) : { id: Date.now(), lifecycle: null };
        entry.type = type;
        if(type === 'seed') {
            entry.plant = currentCat === 'man' ? document.getElementById('sPlantMan').value : document.getElementById(currentCat === 'veg' ? 'sPlantVeg' : 'sPlantFlo').value;
            entry.date = document.getElementById('sDate').value;
            entry.substrate = currentSubstrate;
            const holeFrom = document.getElementById('sHoleFrom').value;
            const holeTo = document.getElementById('sHoleTo').value;
            entry.rawLoc = { cycle: document.getElementById('sCycle').value, tray: document.getElementById('sTray').value, row: document.getElementById('sRow').value, col: document.getElementById('sCol').value, holeFrom: holeFrom, holeTo: holeTo };
            let locStr = `מחזור ${entry.rawLoc.cycle} `;
            let holeStr = '';
            if(entry.substrate === 'עציצי פלסטיק') {
                holeStr = `עציץ ${holeFrom}`;
            } else {
                if(holeTo && holeTo !== '') {
                    holeStr = `גומות ${holeFrom}-${holeTo}`;
                } else if(holeFrom) {
                    holeStr = `גומה ${holeFrom}`;
                }
            }
            locStr += `מגש ${entry.rawLoc.tray} [${entry.rawLoc.row},${entry.rawLoc.col}] ${holeStr}`;
            entry.loc = `${locStr} ${entry.substrate ? '| ' + entry.substrate : ''}`;
            entry.img = activeImg; 
            entry.notes = document.getElementById('sNotes').value;
            const target = parseInt(document.getElementById('sGermTarget').value);
            const actual = document.getElementById('sGermActual').value;
            entry.germActualDate = actual;
            if(actual) {
                const diff = Math.ceil((new Date(actual) - new Date(entry.date)) / 86400000);
                entry.germ = { diff, target, status: diff < target ? 'מוקדם' : (diff > target ? 'מאוחר' : 'בזמן') };
            }
        } else if(type === 'hydro') {
            entry.plant = document.getElementById('hPlant').value;
            entry.date = document.getElementById('hDate').value;
            const sourceId = document.getElementById('hSource').dataset.seedId;
            const sourceStr = document.getElementById('hSource').value;
            
            if(!sourceId && !editId) {
                return alert("יש לבחור מקור שתיל");
            }

            entry.rawLoc = { side: currentSide, row: document.getElementById('hRow').value, hole: document.getElementById('hHole').value, sourceId: sourceId, sourceStr: sourceStr };
            entry.loc = `הידרו צד ${entry.rawLoc.side} [${entry.rawLoc.row}/${entry.rawLoc.hole}]`;
            entry.notes = document.getElementById('hNotes').value;

            // הקטנת הספירה מהמקור
            if(sourceId && !editId) {
                const sourceSeed = db.find(s => s.id == sourceId);
                if(sourceSeed) {
                    const holeFrom = parseInt(sourceSeed.rawLoc.holeFrom);
                    const holeTo = parseInt(sourceSeed.rawLoc.holeTo);
                    const currentCount = holeTo ? (holeTo - holeFrom + 1) : 1;
                    
                    if(!sourceSeed.usedCount) sourceSeed.usedCount = 0;
                    sourceSeed.usedCount++;
                    
                    if(sourceSeed.usedCount >= currentCount && !editId) {
                        sourceSeed.availableForTransfer = false;
                    }
                }
            }
        } else if(type === 'water') {
            entry.plant = "מדדי מים"; 
            entry.date = document.getElementById('wDate').value;
            entry.wPH = parseFloat(document.getElementById('wPH').value) || 0;
            entry.wEC = parseFloat(document.getElementById('wEC').value) || 0;
            entry.wTemp = parseFloat(document.getElementById('wTemp').value) || 0;
            entry.wDO = parseFloat(document.getElementById('wDO').value) || 0;
            entry.loc = `pH:${entry.wPH} EC:${entry.wEC} DO:${entry.wDO}`;
        }
        if(!entry.plant) return alert("הזן שם צמח");
        if(!editId) db.unshift(entry);
        localStorage.setItem('growData', JSON.stringify(db));
        alert("נשמר!");
        
        if(type === 'seed') {
            clearSeedForm();
        } else if(type === 'hydro') {
            clearHydroForm();
        } else if(type === 'water') {
            clearWaterForm();
        }
        
        activeImg = ""; 
        refreshAll(); 
        updateCharts();
    }

    function setLifecycle(id, status) {
        const idx = db.findIndex(i => i.id === id);
        if(idx !== -1) { 
            const entry = db[idx];
            
            // אם זה זריעה והמצב הוא הועבר - יש לבדוק אם יש עדיין זמינות
            if(entry.type === 'seed' && status === 'הועבר') {
                const holeFrom = parseInt(entry.rawLoc.holeFrom);
                const holeTo = parseInt(entry.rawLoc.holeTo);
                const totalCount = entry.substrate === 'עציצי פלסטיק' ? 1 : (holeTo ? (holeTo - holeFrom + 1) : 1);
                const usedCount = entry.usedCount || 0;
                
                if(usedCount >= totalCount) {
                    return alert(`לא ניתן להעביר - כל ${totalCount} הצמחים מאצווה זו כבר הועברו או הושמדו`);
                }
            }
            
            db[idx].lifecycle = status;
            
            // אם זה שתילה בהידרופוני - הקטן את הספירה מהמקור
            if(entry.type === 'hydro' && status === 'הועבר' && entry.rawLoc.sourceId) {
                const sourceSeed = db.find(s => s.id == entry.rawLoc.sourceId);
                if(sourceSeed) {
                    if(!sourceSeed.usedCount) sourceSeed.usedCount = 0;
                    sourceSeed.usedCount++;
                    
                    const holeFrom = parseInt(sourceSeed.rawLoc.holeFrom);
                    const holeTo = parseInt(sourceSeed.rawLoc.holeTo);
                    const currentCount = holeTo ? (holeTo - holeFrom + 1) : 1;
                    
                    if(sourceSeed.usedCount >= currentCount) {
                        sourceSeed.availableForTransfer = false;
                    }
                }
            }
            
            if(status === 'הועבר' && entry.type === 'seed') {
                const plantName = entry.plant;
                showPanel('hydroPanel', document.getElementById('navHydro'));
                document.getElementById('hPlant').value = plantName;
            }
            
            localStorage.setItem('growData', JSON.stringify(db)); 
            refreshAll(); 
        }
    }

    function refreshAll() {
        const qPlantEl = document.getElementById('qPlant'); 
        if(!qPlantEl) return;
        const qP = qPlantEl.value.toLowerCase();
        const qT = document.getElementById('qTray').value, 
              qRS = document.getElementById('qRowS').value, 
              qCS = document.getElementById('qColS').value, 
              qHS = document.getElementById('qHoleS').value;
        const qSi = document.getElementById('qSide').value, 
              qRH = document.getElementById('qRowH').value, 
              qHo = document.getElementById('qHole').value;
        const filtered = db.filter(i => {
            const mP = i.plant.toLowerCase().includes(qP);
            let mLoc = true;
            if(i.type === 'seed' && (qT || qRS || qCS || qHS)) {
                mLoc = (!qT || i.rawLoc.tray == qT) && (!qRS || i.rawLoc.row == qRS) && (!qCS || i.rawLoc.col == qCS) && (!qHS || (i.rawLoc.holeFrom == qHS || i.rawLoc.hole == qHS));
            }
            else if(i.type === 'hydro' && (qSi || qRH || qHo)) {
                mLoc = (!qSi || i.rawLoc.side == qSi) && (!qRH || i.rawLoc.row == qRH) && (!qHo || i.rawLoc.hole == qHo);
            }
            return mP && mLoc;
        });
        
        document.getElementById('historyList').innerHTML = filtered.map(i => {
            let germDisplay = '';
            let countDisplay = '';
            if(i.type === 'seed') {
                const holeFrom = parseInt(i.rawLoc.holeFrom);
                const holeTo = parseInt(i.rawLoc.holeTo);
                const totalCount = i.substrate === 'עציצי פלסטיק' ? 1 : (holeTo ? (holeTo - holeFrom + 1) : 1);
                const usedCount = i.usedCount || 0;
                const remaining = totalCount - usedCount;
                
                countDisplay = `<span class="status-tag tag-count">צמחים: ${remaining}/${totalCount}</span>`;
            }
            if(i.germ) {
                germDisplay = `<span class="status-tag ${i.germ.status==='מוקדם'?'tag-early':i.germ.status==='מאוחר'?'tag-late':'tag-ontime'}">${i.germ.status} (${i.germ.diff} ימים)</span>`;
            }
            let sourceDisplay = '';
            if(i.type === 'hydro' && i.rawLoc.sourceStr) {
                sourceDisplay = `<br><small>מקור: ${i.rawLoc.sourceStr}</small>`;
            }
            
            return `
            <div class="entry type-${i.type}">
                <span style="float:left; color:red; cursor:pointer; margin-right:10px;" onclick="del(${i.id})">🗑️</span>
                <span style="float:left; color:var(--secondary); cursor:pointer; font-size:14px;" onclick="editEntry(${i.id})">עריכה 📝</span>
                <strong>${i.plant}</strong> | ${new Date(i.date).toLocaleDateString('he-IL')}<br><small>${i.loc}</small>${sourceDisplay}
                ${germDisplay}
                ${countDisplay}
                ${i.lifecycle ? `<span class="status-tag ${i.lifecycle==='הועבר'?'tag-moved':i.lifecycle==='נקצר'?'tag-harvested':'tag-dead'}">${i.lifecycle}</span>` : ''}
                ${i.img ? `<br><img src="${i.img}" class="img-preview" onclick="openImageFullscreen('${i.img}')" style="cursor:pointer;">` : ''}
                <div class="status-btn-group">
                    ${i.type === 'seed' && !i.lifecycle ? `<button class="status-btn" ${i.availableForTransfer === false ? 'disabled' : ''} onclick="setLifecycle(${i.id}, 'הועבר')">הועבר 💧</button>` : ''}
                    ${i.type === 'hydro' && !i.lifecycle ? `<button class="status-btn" onclick="setLifecycle(${i.id}, 'נקצר')">נקצר ✂️</button>` : ''}
                    ${i.type !== 'water' && !i.lifecycle ? `<button class="status-btn" onclick="setLifecycle(${i.id}, 'הושמד')">הושמד 💀</button>` : ''}
                </div>
            </div>`;
        }).join('') || "אין תוצאות";
        
        const groups = {};
        db.filter(i => i.type !== 'water').forEach(i => { 
            if(!groups[i.plant]) groups[i.plant] = []; 
            groups[i.plant].push(i); 
        });
        
        document.getElementById('reportList').innerHTML = Object.entries(groups).map(([name, events]) => `
            <div class="card"><h3>${name}</h3>${events.map(e => {
                let sourceInfo = '';
                if(e.type === 'hydro' && e.rawLoc.sourceStr) {
                    sourceInfo = ` (מ: ${e.rawLoc.sourceStr})`;
                }
                return `<div style="border-bottom:1px solid #eee; padding:5px 0;"><b>${e.type==='seed'?'🌱':'💧'}</b> ${new Date(e.date).toLocaleDateString('he-IL')} | ${e.loc}${sourceInfo} ${e.lifecycle ? `[${e.lifecycle}]` : ''}</div>`;
            }).join('')}</div>`).join('');
    }

    function openImageFullscreen(imgSrc) {
        const modal = document.createElement('div');
        modal.style.position = 'fixed';
        modal.style.top = '0';
        modal.style.left = '0';
        modal.style.width = '100%';
        modal.style.height = '100%';
        modal.style.backgroundColor = 'rgba(0,0,0,0.8)';
        modal.style.display = 'flex';
        modal.style.justifyContent = 'center';
        modal.style.alignItems = 'center';
        modal.style.zIndex = '1000';
        modal.onclick = () => modal.remove();
        const img = document.createElement('img');
        img.src = imgSrc;
        img.style.maxWidth = '90%';
        img.style.maxHeight = '90%';
        modal.appendChild(img);
        document.body.appendChild(modal);
    }

    function del(id) { 
        if(confirm('למחוק רשומה זו?')) { 
            db = db.filter(i => i.id !== id); 
            localStorage.setItem('growData', JSON.stringify(db)); 
            refreshAll(); 
            updateCharts(); 
        } 
    }

    function confirmDeleteAll() {
        if(!confirm('אתה בטוח שברצונך למחוק את כל ההיסטוריה? הפעולה לא ניתנת לשחזור!')) return;
        if(!confirm('זה האזהרה האחרונה! מחיקה סופית של כל הנתונים והתמונות!')) return;
        
        db = [];
        localStorage.setItem('growData', JSON.stringify(db));
        refreshAll();
        updateCharts();
        alert('כל ההיסטוריה נמחקה בהצלחה');
    }
    
    function exportCSV() {
        if (db.length === 0) return alert("אין נתונים לייצוא");
        let csv = "\uFEFFסוג,צמח,תאריך,מחזור,מגש,שורה,עמודה,גומה מי,גומה עד,צד,שורה הידרו,חור הידרו,תת-מצע,סטטוס חיים,הערות,ימי צפי הצצה,ימי הצצה בפועל,סטטוס הצצה,מקור השתיל,PH,EC,טמפרטורה,DO\n";
        
        db.forEach(i => {
            let row = [

                i.date ? new Date(i.date).toLocaleDateString('he-IL') : '',
                i.type === 'seed' && i.rawLoc ? i.rawLoc.cycle : '',
                i.type === 'seed' && i.rawLoc ? i.rawLoc.tray : '',
                i.type === 'seed' && i.rawLoc ? i.rawLoc.row : '',
                i.type === 'seed' && i.rawLoc ? i.rawLoc.col : '',
                i.type === 'seed' && i.rawLoc ? i.rawLoc.holeFrom : (i.type === 'hydro' && i.rawLoc ? i.rawLoc.hole : ''),
                i.type === 'seed' && i.rawLoc ? i.rawLoc.holeTo : '',
                i.type === 'hydro' && i.rawLoc ? i.rawLoc.side : '',
                i.type === 'hydro' && i.rawLoc ? i.rawLoc.row : '',
                i.type === 'hydro' && i.rawLoc ? i.rawLoc.hole : '',
                i.type === 'seed' && i.substrate ? i.substrate : '',

        link.href = URL.createObjectURL(blob);
        link.download = `GrowLog_${new Date().toLocaleDateString().replace(/\//g, '-')}.csv`;
        link.click();
    }

                i.type === 'seed' && i.rawLoc ? i.rawLoc.tray : '',

                i.type === 'seed' && i.rawLoc ? i.rawLoc.col : '',

            csvContent += row.map(cell => `"${cell}"`).join(',') + "\n";

        zip.file('GrowLog.csv', csvContent);

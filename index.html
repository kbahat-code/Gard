<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowManager PRO</title>
    <style>
        :root {
            --primary:   #2e7d32;
            --secondary: #0288d1;
            --accent:    #546e7a;
            --bg:        #f0f2f5;
            --card:      #ffffff;
            --error:     #d32f2f;
            --success:   #388e3c;
            --warning:   #ff9800;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            padding: 10px;
            margin: 0;
            direction: rtl;
        }

        .container {
            max-width: 650px;
            margin: auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card);
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex-wrap: wrap;
            gap: 8px;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #userEmail {
            background: #2196F3;
            color: #fff;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
        }

        #syncBadge {
            background: #4CAF50;
            color: #fff;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
        }

        .logout-btn {
            background: #f44336;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        .nav-bar {
            display: flex;
            background: var(--card);
            border-radius: 15px;
            margin-bottom: 20px;
            padding: 5px;
            gap: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        .nav-item {
            flex: 1;
            min-width: 70px;
            padding: 12px 5px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
            border-radius: 10px;
            color: #666;
            transition: 0.3s;
        }

        .nav-item.active {
            background: var(--primary);
            color: white;
        }

        .panel   { display: none; }
        .panel.active { display: block; }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        h2 {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            color: var(--primary);
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        h3 {
            margin: 10px 0;
            font-size: 1rem;
            color: var(--primary);
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 11px;
            color: #777;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            margin-bottom: 10px;
            font-size: 15px;
            background: #fafafa;
            transition: border-color 0.2s, background 0.2s;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr;           gap: 8px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr;       gap: 8px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4,1fr);     gap: 5px; }

        .single-row {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 5px;
        }

        .selector {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .opt {
            flex: 1;
            padding: 8px;
            background: #f8f8f8;
            border: 2px solid #eee;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .opt:hover     { background: #e8f5e9; }
        .opt.active-opt {
            border-color: var(--primary);
            background: #e8f5e9;
            font-weight: bold;
        }

        .main-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            font-size: 16px;
        }

        .clear-btn {
            width: 100%;
            padding: 12px;
            border: 2px solid #90a4ae;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            color: #546e7a;
            font-size: 14px;
            background: #eceff1;
            margin-top: 8px;
            transition: background 0.2s, color 0.2s;
        }

        .clear-btn:hover {
            background: #cfd8dc;
            color: #263238;
        }

        .action-btn {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            font-size: 11px;
            margin: 2px;
        }

        .btn-destroy    { background: var(--error);   }
        .btn-transfer   { background: var(--secondary); }
        .btn-harvest    { background: var(--success);  }
        .btn-germinated { background: var(--warning);  }

        .cam-box {
            background: #f0f0f0;
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .hidden { display: none !important; }

        .img-preview {
            max-width: 100%;
            max-height: 150px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .info-box {
            background: #e3f2fd;
            border-right: 4px solid var(--secondary);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 12px;
            color: #1565c0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 11px;
        }

        th, td {
            padding: 8px 4px;
            text-align: right;
            border-bottom: 1px solid #eee;
        }

        th {
            background: var(--primary);
            color: white;
            font-weight: bold;
            font-size: 10px;
        }

        .thumb {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-del {
            background: var(--error);
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
            white-space: nowrap;
        }

        .badge-seed        { background: #c8e6c9; color: #2e7d32; }
        .badge-hydro       { background: #b3e5fc; color: #0277bd; }
        .badge-water       { background: #f8bbd0; color: #c2185b; }
        .badge-calibration { background: #ffe0b2; color: #e65100; }

        .overdue          { color: var(--error);   font-weight: bold; }
        .germinated-early { color: var(--success);  font-weight: bold; }
        .germinated-late  { color: var(--error);    font-weight: bold; }

        .limit-input {
            width: 70px;
            padding: 6px;
            font-size: 13px;
        }

        .calibration-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .calibration-row label { margin: 0; flex: 1; }
        .calibration-row input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin: 0;
        }

        .metrics-entry-card {
            background: #f8fffe;
            border: 2px solid #b2dfdb;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .metrics-date-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .metrics-date-row label {
            margin: 0;
            font-size: 13px;
            font-weight: bold;
            color: var(--primary);
            white-space: nowrap;
        }

        .metrics-date-row input[type="date"] {
            flex: 1;
            margin: 0;
            font-size: 14px;
        }

        .metrics-values-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .metric-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .metric-field label {
            font-size: 11px;
            font-weight: bold;
            color: #555;
            margin: 0;
        }

        .metric-field input {
            margin: 0;
            font-size: 15px;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #ddd;
            transition: border-color 0.2s, background 0.2s;
        }

        .input-out-of-range {
            border-color: #d32f2f !important;
            background:   #ffebee !important;
            color:        #b71c1c !important;
        }

        .water-indicator {
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: bold;
        }

        .water-indicator.ok {
            background: #e8f5e9;
            border: 2px solid #4caf50;
            color: #2e7d32;
        }

        .water-indicator.warning {
            background: #fff8e1;
            border: 2px solid #ffb300;
            color: #e65100;
        }

        .water-indicator.overdue {
            background: #ffebee;
            border: 2px solid #d32f2f;
            color: #b71c1c;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0   rgba(211,47,47,0.4); }
            70%  { box-shadow: 0 0 0 8px rgba(211,47,47,0);   }
            100% { box-shadow: 0 0 0 0   rgba(211,47,47,0);   }
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 220px;
            overflow: hidden;
        }

        .chart-container canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%  !important;
            height: 100% !important;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"><\/script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"><\/script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"><\/script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"><\/script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"><\/script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"><\/script>
</head>
<body>
<div class="top-bar">
    <div class="user-section">
        <span id="userEmail">טוען...</span>
        <span id="syncBadge">💾 מוכן</span>
    </div>
    <button class="logout-btn" onclick="logout()">🚪 התנתק</button>
</div>

<div class="container">
    <div class="nav-bar">
        <div class="nav-item active" data-panel="seedPanel">🌱 זריעה</div>
        <div class="nav-item"        data-panel="hydroPanel">💧 הידרו</div>
        <div class="nav-item"        data-panel="dataPanel">📊 מדדים</div>
        <div class="nav-item"        data-panel="historyPanel">🔍 חיפוש</div>
        <div class="nav-item"        data-panel="reportPanel">🗂️ כרטיסיות</div>
        <div class="nav-item"        data-panel="limitsPanel">⚙️ גבולות</div>
    </div>

    <!-- ═══════════════════════════════════════
         פאנל זריעה
    ════════════════════════════════════════ -->
    <div id="seedPanel" class="panel active">
        <div class="card">
            <h2>🌱 יומן זריעה</h2>

            <label>סוג מצע:</label>
            <div class="selector">
                <div class="opt active-opt" data-substrate="מגשי פלסטיק">מגשי פלסטיק</div>
                <div class="opt"            data-substrate="צמר סלעים">צמר סלעים</div>
                <div class="opt"            data-substrate="עציצי פלסטיק">עציצי פלסטיק</div>
            </div>

            <div class="single-row">
                <div>
                    <label>מחזור</label>
                    <input type="text" id="sCycle" value="1">
                </div>
                <div>
                    <label id="lblTray">מגש</label>
                    <input type="text" id="sTray" value="1">
                </div>
                <div>
                    <label>מגומה</label>
                    <input type="number" id="sHoleFrom" value="1">
                </div>
                <div>
                    <label>עד גומה</label>
                    <input type="number" id="sHoleTo" value="1">
                </div>
            </div>

            <div id="plantCountDisplay" class="info-box" style="display:none;"></div>

            <label>קטגוריה:</label>
            <div class="selector">
                <div class="opt active-opt" data-cat="veg">ירקות</div>
                <div class="opt"            data-cat="flo">פרחים</div>
                <div class="opt"            data-cat="manual">קלט ידני</div>
            </div>

            <label>שם הצמח:</label>
            <select id="sPlantVeg"></select>
            <select id="sPlantFlo" class="hidden"></select>
            <input  type="text" id="sPlantManual" class="hidden"
                    placeholder="הקלד שם צמח...">

            <div class="grid-3">
                <div>
                    <label>תאריך זריעה:</label>
                    <input type="date" id="sDate">
                </div>
                <div>
                    <label>ימי הצצה:</label>
                    <input type="number" id="sGermTarget" readonly>
                </div>
                <div>
                    <label>נביטה צפויה:</label>
                    <input type="text" id="sGerm" readonly>
                </div>
            </div>

            <div id="tipsArea" class="info-box" style="display:none;"></div>

            <div class="cam-box" onclick="document.getElementById('sFile').click()">
                📸 לחץ לצילום
            </div>
            <input type="file" id="sFile" accept="image/*"
                   capture="environment" class="hidden">
            <img id="sPreview" class="img-preview" style="display:none;">

            <label>הערות:</label>
            <textarea id="sNotes" placeholder="הערות..."></textarea>

            <button id="btnSaveSeed" class="main-btn"
                    style="background:var(--primary)">💾 שמור זריעה</button>
            <button type="button" class="clear-btn" onclick="clearSeedForm()">
                🗑️ נקה טופס
            </button>
        </div>
    </div>
    <!-- ═══════════════════════════════════════
         פאנל הידרו
    ════════════════════════════════════════ -->
    <div id="hydroPanel" class="panel">
        <div class="card">
            <h2>💧 שתילה במערכת הידרו</h2>

            <div class="grid-2">
                <div>
                    <label>צד:</label>
                    <select id="hSide">
                        <option value="1">1</option>
                        <option value="2">2</option>
                    </select>
                </div>
                <div>
                    <label>חור:</label>
                    <input type="number" id="hHole">
                </div>
            </div>

            <label>שם הצמח:</label>
            <input type="text" id="hPlant" placeholder="חפש צמח...">

            <label>מקור השתיל:</label>
            <input type="text" id="hSource"
                   placeholder="מחזור-מגש-גומה או חיצוני/ייחור">

            <label>תאריך שתילה:</label>
            <input type="date" id="hDate">

            <label>הערות:</label>
            <textarea id="hNotes" placeholder="הערות..."></textarea>

            <button id="btnSaveHydro" class="main-btn"
                    style="background:var(--secondary)">💾 שמור שתילה</button>
        </div>
    </div>

    <!-- ═══════════════════════════════════════
         פאנל מדדים
    ════════════════════════════════════════ -->
    <div id="dataPanel" class="panel">

        <div id="waterChangeIndicator" class="water-indicator ok">
            <span id="waterIndicatorIcon">✅</span>
            <span id="waterIndicatorText">טוען נתוני החלפת מים...</span>
        </div>

        <div class="card">
            <h2>📊 הזנת מדדים יומיים</h2>
            <div class="metrics-entry-card">
                <div class="metrics-date-row">
                    <label>📅 תאריך מדידה:</label>
                    <input type="date" id="wDate">
                </div>
                <div class="metrics-values-grid">
                    <div class="metric-field">
                        <label>🧪 pH</label>
                        <input type="number" step="0.1" id="wPH" placeholder="pH">
                    </div>
                    <div class="metric-field">
                        <label>⚡ EC (mS/cm)</label>
                        <input type="number" step="0.1" id="wEC" placeholder="EC">
                    </div>
                    <div class="metric-field">
                        <label>🌡️ טמפרטורה (°C)</label>
                        <input type="number" id="wTemp" placeholder="T°C">
                    </div>
                    <div class="metric-field">
                        <label>💨 DO (%)</label>
                        <input type="number" step="0.1" id="wDO" placeholder="DO %">
                    </div>
                </div>
            </div>

            <div id="wWarn" class="info-box"
                 style="display:none;background:#fff3e0;
                        border-right-color:#ff9800;color:#e65100;">
            </div>

            <button id="btnSaveWater" class="main-btn"
                    style="background:var(--accent)">💾 שמור מדדים</button>
            <button type="button" class="clear-btn" onclick="clearMetricsForm()">
                🗑️ נקה טופס
            </button>
        </div>

        <div class="card">
            <h2>⚙️ כיול חיישנים</h2>
            <label>תאריך כיול:</label>
            <input type="date" id="calibrationDate">
            <div class="calibration-row">
                <label>pH</label>
                <input type="checkbox" id="calPH">
            </div>
            <div class="calibration-row">
                <label>EC</label>
                <input type="checkbox" id="calEC">
            </div>
            <div class="calibration-row">
                <label>DO</label>
                <input type="checkbox" id="calDO">
            </div>
            <button id="btnSaveCalibration" class="main-btn"
                    style="background:var(--warning)">✅ שמור כיול</button>
        </div>

        <div class="card">
            <h3>📈 גרף pH</h3>
            <div class="chart-container">
                <canvas id="chartPH"></canvas>
            </div>
        </div>
        <div class="card">
            <h3>📈 גרף EC</h3>
            <div class="chart-container">
                <canvas id="chartEC"></canvas>
            </div>
        </div>
        <div class="card">
            <h3>📈 גרף טמפרטורה</h3>
            <div class="chart-container">
                <canvas id="chartTemp"></canvas>
            </div>
        </div>
        <div class="card">
            <h3>📈 גרף DO</h3>
            <div class="chart-container">
                <canvas id="chartDO"></canvas>
            </div>
        </div>

    </div><!-- /dataPanel -->
    <!-- ═══════════════════════════════════════
         פאנל חיפוש
    ════════════════════════════════════════ -->
    <div id="historyPanel" class="panel">
        <div class="card">
            <h2>🔍 חיפוש מתקדם</h2>
            <label>חיפוש חופשי:</label>
            <input type="text" id="searchInput"
                   placeholder="הקלד לחיפוש..."
                   oninput="searchTable()">
            <h3>🔎 סינון</h3>
            <div class="grid-2">
                <div>
                    <label>צמח:</label>
                    <select id="fPlant" onchange="applyFilters()">
                        <option value="">הכל</option>
                    </select>
                </div>
                <div>
                    <label>מחזור:</label>
                    <select id="fCycle" onchange="applyFilters()">
                        <option value="">הכל</option>
                    </select>
                </div>
                <div>
                    <label>מגש:</label>
                    <select id="fTray" onchange="applyFilters()">
                        <option value="">הכל</option>
                    </select>
                </div>
                <div>
                    <label>סוג:</label>
                    <select id="fType" onchange="applyFilters()">
                        <option value="">הכל</option>
                        <option value="seed">זריעה</option>
                        <option value="hydro">שתילה</option>
                        <option value="water">מדדי מים</option>
                        <option value="calibration">כיול</option>
                    </select>
                </div>
                <div>
                    <label>מתאריך:</label>
                    <input type="date" id="fDateFrom" onchange="applyFilters()">
                </div>
                <div>
                    <label>עד תאריך:</label>
                    <input type="date" id="fDateTo" onchange="applyFilters()">
                </div>
            </div>
            <button onclick="resetFilters()" class="main-btn"
                    style="background:var(--accent);margin-top:10px;">
                🔄 אפס סינון
            </button>
            <div style="overflow-x:auto;margin-top:20px;">
                <table>
                    <thead>
                        <tr>
                            <th>תאריך</th><th>סוג</th><th>צמח</th>
                            <th>מחזור</th><th>מגש</th><th>מיקום</th>
                            <th>נבט בתאריך</th><th>מדדים</th>
                            <th>תמונה</th><th>הערות</th><th>פעולות</th>
                        </tr>
                    </thead>
                    <tbody id="logBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════
         פאנל כרטיסיות
    ════════════════════════════════════════ -->
    <div id="reportPanel" class="panel">
        <div class="card">
            <h2>🗂️ כרטיסיות צמחים</h2>
            <div id="reportList"></div>
            <button onclick="exportData()" class="main-btn"
                    style="background:var(--secondary);margin-top:20px;">
                📊 ייצוא נתונים
            </button>
        </div>
    </div>

// ═══════════════════════════════════════════════════════
// 🔐 AUTHENTICATION
// ═══════════════════════════════════════════════════════
function showLoginUI() {
    const email = prompt('📧 הכנס אימייל:');
    if (!email) {
        alert('❌ חובה להזין אימייל');
        setTimeout(showLoginUI, 500);
        return;
    }
    const password = prompt('🔑 הכנס סיסמה (6+ תווים):');
    if (!password || password.length < 6) {
        alert('❌ סיסמה חייבת להיות 6+ תווים');
        setTimeout(showLoginUI, 500);
        return;
    }

    auth.signInWithEmailAndPassword(email, password)
        .then(() => {
            currentUser = auth.currentUser;
            document.getElementById('userEmail').textContent = email;
            updateSyncBadge('success', 'התחברת בהצלחה');
            initFirebaseSync();
        })
        .catch(err => {
            if (err.code === 'auth/user-not-found' ||
                err.code === 'auth/wrong-password') {
                if (confirm('❌ משתמש לא קיים. ליצור חשבון חדש?')) {
                    auth.createUserWithEmailAndPassword(email, password)
                        .then(() => {
                            currentUser = auth.currentUser;
                            document.getElementById('userEmail').textContent = email;
                            updateSyncBadge('success', 'חשבון נוצר בהצלחה');
                            initFirebaseSync();
                        })
                        .catch(e => {
                            alert('❌ שגיאה ביצירת חשבון: ' + e.message);
                            setTimeout(showLoginUI, 500);
                        });
                } else { setTimeout(showLoginUI, 500); }
            } else {
                alert('❌ שגיאת התחברות: ' + err.message);
                setTimeout(showLoginUI, 500);
            }
        });
}

function logout() {
    if (!confirm('🚪 להתנתק מהמערכת?')) return;
    if (unsubscribeSnapshot) unsubscribeSnapshot();
    auth.signOut()
        .then(() => {
            currentUser = null;
            db = [];
            localStorage.removeItem('growData');
            location.reload();
        })
        .catch(err => alert('❌ שגיאה בהתנתקות: ' + err.message));
}

auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
        document.getElementById('userEmail').textContent = user.email || 'משתמש';
        initFirebaseSync();
    } else {
        showLoginUI();
    }
});

// ═══════════════════════════════════════════════════════
// 💾 SYNC
// ═══════════════════════════════════════════════════════
function updateSyncBadge(status, message) {
    const badge = document.getElementById('syncBadge');
    if (!badge) return;
    const icons = {
        syncing: '🔄 מסנכרן',
        success: '✅ סונכרן',
        error:   '❌ שגיאה',
        offline: '📡 לא מקוון',
        ready:   '💾 מוכן'
    };
    badge.textContent = icons[status] || icons.ready;
    badge.title       = message || status;
    if (status === 'success') {
        setTimeout(() => {
            badge.textContent = icons.ready;
            badge.title       = 'מוכן';
        }, 2000);
    }
}

async function syncToFirebase() {
    if (!currentUser) return;
    try {
        updateSyncBadge('syncing', 'מסנכרן לענן...');
        const batch   = firestore.batch();
        const userRef = firestore
            .collection('users').doc(currentUser.uid).collection('growData');
        const existing = await userRef.get();
        existing.forEach(doc => batch.delete(doc.ref));
        db.forEach(item => {
            const docRef     = userRef.doc(String(item.id));
            const dataToSync = { ...item };
            delete dataToSync.img;
            batch.set(docRef, {
                ...dataToSync,
                lastModified: firebase.firestore.FieldValue.serverTimestamp()
            });
        });
        await batch.commit();
        updateSyncBadge('success', `${db.length} פריטים נשמרו`);
    } catch (error) {
        console.error('❌ Sync Error:', error);
        updateSyncBadge('error', error.message);
    }
}

async function syncFromFirebase() {
    if (!currentUser) return;
    try {
        const snapshot = await firestore
            .collection('users').doc(currentUser.uid)
            .collection('growData').get();
        if (snapshot.empty) return;
        const cloudData = snapshot.docs.map(doc => doc.data());
        const merged    = [...db];
        cloudData.forEach(cloudItem => {
            const localIdx = merged.findIndex(i => i.id === cloudItem.id);
            if (localIdx === -1) {
                merged.push(cloudItem);
            } else {
                const ld = new Date(merged[localIdx].date || 0).getTime();
                const cd = new Date(cloudItem.date        || 0).getTime();
                if (cd > ld) {
                    const li = merged[localIdx].img;
                    merged[localIdx] = cloudItem;
                    if (li) merged[localIdx].img = li;
                }
            }
        });
        db = merged;
        localStorage.setItem('growData', JSON.stringify(db));
        refreshAll();
        updateCharts();
    } catch (error) {
        console.error('❌ Fetch Error:', error);
        updateSyncBadge('error', 'שגיאת קריאה מהענן');
    }
}

function initFirebaseSync() {
    if (!currentUser) return;
    syncFromFirebase();
    const userRef = firestore
        .collection('users').doc(currentUser.uid).collection('growData');
    unsubscribeSnapshot = userRef.onSnapshot(snapshot => {
        if (snapshot.metadata.hasPendingWrites) return;
        syncFromFirebase();
    }, error => {
        console.error('❌ Snapshot error:', error);
        updateSyncBadge('error', 'שגיאת מעקב');
    });
    setInterval(() => {
        if (navigator.onLine && currentUser) syncToFirebase();
        else updateSyncBadge('offline', 'אין חיבור לאינטרנט');
    }, 30000);
}

function saveAndSync() {
    localStorage.setItem('growData', JSON.stringify(db));
    syncToFirebase();
}

function loadFromLocal() {
    const stored = localStorage.getItem('growData');
    if (stored) {
        try { db = JSON.parse(stored); }
        catch (e) { db = []; }
    } else { db = []; }
}

<script>
// ═══════════════════════════════════════════════════════
// 💧 WATER CHANGE + INDICATOR
// ═══════════════════════════════════════════════════════
function updateWaterChangeDate() {
    const lastInput = document.getElementById('lastWaterChange');
    const nextInput = document.getElementById('nextWaterChange');
    if (!lastInput || !nextInput || !lastInput.value) return;

    const next  = new Date(lastInput.value);
    next.setMonth(next.getMonth() + 3);

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    nextInput.value = next.toLocaleDateString('he-IL');

    if (next < today) {
        nextInput.style.color      = 'var(--error)';
        nextInput.style.fontWeight = 'bold';
    } else {
        nextInput.style.color      = '#000';
        nextInput.style.fontWeight = 'normal';
    }
    refreshWaterIndicator(lastInput.value, next, today);
}

function saveWaterChangeDate() {
    const lastInput = document.getElementById('lastWaterChange');
    if (!lastInput || !lastInput.value) {
        alert('❌ נא לבחור תאריך');
        return;
    }
    localStorage.setItem('lastWaterChange', lastInput.value);
    updateWaterChangeDate();
    alert('✅ תאריך החלפת מים נשמר');
}

function refreshWaterIndicator(lastDateStr, nextDate, today) {
    const indicator = document.getElementById('waterChangeIndicator');
    const iconEl    = document.getElementById('waterIndicatorIcon');
    const textEl    = document.getElementById('waterIndicatorText');
    if (!indicator || !iconEl || !textEl) return;

    const daysUntil = Math.ceil(
        (nextDate - today) / (1000 * 60 * 60 * 24)
    );
    const lastFmt = new Date(lastDateStr).toLocaleDateString('he-IL');
    const nextFmt = nextDate.toLocaleDateString('he-IL');

    indicator.classList.remove('ok', 'warning', 'overdue');

    if (daysUntil < 0) {
        indicator.classList.add('overdue');
        iconEl.textContent = '🚨';
        textEl.textContent =
            `החלפת מים באיחור של ${Math.abs(daysUntil)} ימים! ` +
            `(אחרונה: ${lastFmt} | הייתה צריכה להיות: ${nextFmt})`;
    } else if (daysUntil <= 14) {
        indicator.classList.add('warning');
        iconEl.textContent = '⚠️';
        textEl.textContent =
            `החלפת מים בעוד ${daysUntil} ימים (${nextFmt}) – הכן מכל טרי`;
    } else {
        indicator.classList.add('ok');
        iconEl.textContent = '✅';
        textEl.textContent =
            `החלפת מים הבאה: ${nextFmt} (עוד ${daysUntil} ימים)`;
    }
}

function loadWaterChangeDate() {
    const stored    = localStorage.getItem('lastWaterChange');
    const lastInput = document.getElementById('lastWaterChange');
    if (stored && lastInput) {
        lastInput.value = stored;
        updateWaterChangeDate();
    } else {
        const indicator = document.getElementById('waterChangeIndicator');
        const iconEl    = document.getElementById('waterIndicatorIcon');
        const textEl    = document.getElementById('waterIndicatorText');
        if (indicator) {
            indicator.classList.remove('ok','warning','overdue');
            indicator.classList.add('ok');
        }
        if (iconEl) iconEl.textContent = 'ℹ️';
        if (textEl) textEl.textContent =
            'הגדר תאריך החלפת מים בכרטיסיית ⚙️ גבולות';
    }
}

// ═══════════════════════════════════════════════════════

function checkLimits() {
    const l    = getLimits();
    const ph   = parseFloat(document.getElementById('wPH').value);
    const ec   = parseFloat(document.getElementById('wEC').value);
    const temp = parseFloat(document.getElementById('wTemp').value);
    const dox  = parseFloat(document.getElementById('wDO').value);

    function colorField(id, value, min, max) {
        const el = document.getElementById(id);
        if (!el) return false;
        const out = !isNaN(value) && value !== 0 &&
                    (value < min || value > max);
        el.classList.toggle('input-out-of-range', out);
        return out;
    }

    const w1 = colorField('wPH',   ph,   l.phMin, l.phMax);
    const w2 = colorField('wEC',   ec,   l.ecMin, l.ecMax);
    const w3 = colorField('wTemp', temp, l.tmMin, l.tmMax);
    const w4 = colorField('wDO',   dox,  l.doMin, l.doMax);

    const warnBox  = document.getElementById('wWarn');
    const warnings = [];
    if (w1) warnings.push(`⚠️ pH (${ph}) מחוץ לטווח ${l.phMin}–${l.phMax}`);
    if (w2) warnings.push(`⚠️ EC (${ec}) מחוץ לטווח ${l.ecMin}–${l.ecMax}`);
    if (w3) warnings.push(`⚠️ טמפרטורה (${temp}°C) מחוץ לטווח ${l.tmMin}–${l.tmMax}°C`);
    if (w4) warnings.push(`⚠️ DO (${dox}%) מחוץ לטווח ${l.doMin}–${l.doMax}%`);

    if (warnBox) {
        if (warnings.length > 0) {
            warnBox.innerHTML     = warnings.join('<br>');
            warnBox.style.display = 'block';
        } else {
            warnBox.style.display = 'none';
        }
    }
}

// ═══════════════════════════════════════════════════════
// 🗑️ CLEAR FORMS
// ═══════════════════════════════════════════════════════

    document.getElementById('sCycle').value    = '1';
    document.getElementById('sTray').value     = '1';
    document.getElementById('sHoleFrom').value = '1';

<script>
// ═══════════════════════════════════════════════════════
// 💾 DATA ENTRY – saveData
// ═══════════════════════════════════════════════════════
function saveData(type) {
    if (!currentUser) { alert('❌ יש להתחבר למערכת'); return; }

    if (type === 'seed') {
        let plant;
        if (currentCat === 'manual') {
            plant = document.getElementById('sPlantManual').value.trim();
            if (!plant) { alert('❌ נא להזין שם צמח'); return; }
        } else {
            plant = currentCat === 'veg'
                ? document.getElementById('sPlantVeg').value
                : document.getElementById('sPlantFlo').value;
        }

        const dateSeed = document.getElementById('sDate').value;
        const cycle    = document.getElementById('sCycle').value;
        const tray     = document.getElementById('sTray').value;
        const holeFrom = parseInt(document.getElementById('sHoleFrom').value || 0);
        const holeTo   = parseInt(document.getElementById('sHoleTo').value   || 0);
        const notes    = document.getElementById('sNotes').value;

        if (!plant || !dateSeed || !cycle || !tray ||
            holeFrom === 0 || holeTo === 0) {
            alert('❌ נא למלא את כל השדות החובה');
            return;
        }
        if (holeFrom > holeTo) {
            alert('❌ גומה התחלה חייבת להיות קטנה או שווה לגומה סיום');
            return;
        }

        const plantData = currentCat === 'manual'
            ? null
            : plants[currentCat].find(p => p.n === plant);
        const germDays  = plantData
            ? plantData.d
            : parseInt(document.getElementById('sGermTarget').value || 7);
        const germDate  = new Date(dateSeed);
        germDate.setDate(germDate.getDate() + germDays);

        let saved = 0;
        for (let hole = holeFrom; hole <= holeTo; hole++) {
            const newId   = db.length
                ? Math.max(...db.map(i => i.id)) + 1 : 1;
            const batchId = `${cycle}-${tray}-${hole}`;
            db.push({
                id: newId, type: 'seed', category: currentCat,
                plant, date: dateSeed, substrate: currentSubstrate,
                location: { cycle, tray, hole }, batchId,
                germDays,
                germExpected: germDate.toISOString().split('T')[0],
                germActual: null, notes,
                img: activeImg || '',
                timestamp: Date.now(), status: 'active'
            });
            saved++;
        }
        activeImg = '';
        document.getElementById('sPreview').style.display = 'none';
        document.getElementById('sNotes').value = '';
        saveAndSync();
        refreshAll();
        alert(`✅ ${saved} צמחים נשמרו בהצלחה`);

    } else if (type === 'hydro') {
        const plant  = document.getElementById('hPlant').value;
        const source = document.getElementById('hSource').value;
        const side   = parseInt(document.getElementById('hSide').value  || 0);
        const hole   = parseInt(document.getElementById('hHole').value  || 0);
        const dateH  = document.getElementById('hDate').value;
        const notes  = document.getElementById('hNotes').value;

        if (!plant || !dateH || !side || !hole) {
            alert('❌ נא למלא את כל השדות החובה');
            return;
        }

        const occupied = db.find(i =>
            i.type    === 'hydro' &&
            i.hydroLoc && i.hydroLoc.side === side &&
            i.hydroLoc.hole === hole &&
            i.status  === 'active'
        );
        if (occupied) {
            alert('❌ לא ניתן לשתול בחור זה - החור תפוס');
            return;
        }

        const newId = db.length
            ? Math.max(...db.map(i => i.id)) + 1 : 1;
        db.push({
            id: newId, type: 'hydro', plant,
            source: source || 'לא צוין',
            date: dateH,
            hydroLoc: { side, hole },
            notes, timestamp: Date.now(), status: 'active'
        });
        document.getElementById('hPlant').value  = '';
        document.getElementById('hSource').value = '';
        document.getElementById('hHole').value   = '';
        document.getElementById('hNotes').value  = '';
        saveAndSync();
        refreshAll();
        alert('✅ שתילה נשמרה בהצלחה');

    } else if (type === 'water') {
        const dateW = document.getElementById('wDate').value;
        const ph    = parseFloat(document.getElementById('wPH').value)   || 0;
        const ec    = parseFloat(document.getElementById('wEC').value)   || 0;
        const temp  = parseFloat(document.getElementById('wTemp').value) || 0;
        const dox   = parseFloat(document.getElementById('wDO').value)   || 0;

        if (!dateW) { alert('❌ נא למלא תאריך מדידה'); return; }
        if (ph === 0 && ec === 0 && temp === 0 && dox === 0) {
            alert('❌ נא למלא לפחות ערך אחד');
            return;
        }

        const newId = db.length
            ? Math.max(...db.map(i => i.id)) + 1 : 1;
        db.push({
            id: newId, type: 'water',
            date: dateW, ph, ec, temp, do: dox,
            timestamp: Date.now()
        });

        ['wPH','wEC','wTemp','wDO'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.value = '';
                el.classList.remove('input-out-of-range');
            }
        });
        const warnBox = document.getElementById('wWarn');
        if (warnBox) warnBox.style.display = 'none';

        saveAndSync();
        refreshAll();
        updateCharts();
        alert('✅ מדדים נשמרו בהצלחה');

    } else if (type === 'calibration') {
        const calDate = document.getElementById('calibrationDate').value;
        const calPH   = document.getElementById('calPH').checked;
        const calEC   = document.getElementById('calEC').checked;
        const calDO   = document.getElementById('calDO').checked;

        if (!calDate) { alert('❌ נא למלא תאריך כיול'); return; }
        if (!calPH && !calEC && !calDO) {
            alert('❌ נא לסמן לפחות חיישן אחד');
            return;
        }

        const sensors = [];
        if (calPH) sensors.push('pH');
        if (calEC) sensors.push('EC');
        if (calDO) sensors.push('DO');

        const newId = db.length
            ? Math.max(...db.map(i => i.id)) + 1 : 1;
        db.push({
            id: newId, type: 'calibration',
            date: calDate,
            sensors: sensors.join(', '),
            timestamp: Date.now()
        });
        document.getElementById('calibrationDate').value = '';
        document.getElementById('calPH').checked = false;
        document.getElementById('calEC').checked = false;
        document.getElementById('calDO').checked = false;

        saveAndSync();
        refreshAll();
        alert('✅ כיול נשמר בהצלחה');
    }
}

// ═══════════════════════════════════════════════════════
// פעולות על רשומות
// ═══════════════════════════════════════════════════════
function markGerminated(id) {
    const item = db.find(i => i.id === id);
    if (!item || item.type !== 'seed') {
        alert('❌ לא נמצא פריט זריעה');
        return;
    }
    const germDate = prompt(
        '📅 הזן תאריך נביטה (YYYY-MM-DD):',
        new Date().toISOString().split('T')[0]
    );
    if (!germDate) return;
    item.germActual = germDate;
    saveAndSync();
    refreshAll();
    alert('✅ תאריך נביטה נשמר');
}

function harvestPlant(id) {
    const item = db.find(i => i.id === id);
    if (!item) { alert('❌ לא נמצא פריט'); return; }
    const action = confirm('🌾 לסמן כנקצר?')
        ? 'harvested'
        : confirm('🗑️ לסמן כהושמד?')
            ? 'destroyed'
            : null;
    if (!action) return;
    item.status = action;
    item[action + 'Date'] = new Date().toISOString().split('T')[0];
    saveAndSync();
    refreshAll();
    alert(`✅ הצמח סומן כ${
        action === 'harvested' ? 'נקצר' : 'הושמד'
    }`);
}

function transferToHydro(id) {
    const item = db.find(i => i.id === id);
    if (!item || item.type !== 'seed') {
        alert('❌ לא נמצא פריט זריעה');
        return;
    }
    document.querySelectorAll('.panel')
        .forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item')
        .forEach(b => b.classList.remove('active'));
    document.getElementById('hydroPanel').classList.add('active');
    document.querySelector('[data-panel="hydroPanel"]').classList.add('active');
    document.getElementById('hPlant').value  = item.plant;
    document.getElementById('hSource').value = item.batchId;
    document.getElementById('hDate').value   =
        new Date().toISOString().split('T')[0];
    item.status = 'transferred';
    item.transferredDate = new Date().toISOString().split('T')[0];
    saveAndSync();
    refreshAll();
    alert('✅ הצמח הועבר לממשק ההידרו. השלם את הפרטים ושמור.');
}

function deleteItem(id) {
    if (!confirm('❌ האם למחוק רשומה זו לצמיתות?')) return;
    db = db.filter(i => i.id !== id);
    saveAndSync();
    refreshAll();
    updateCharts();
    alert('✅ רשומה נמחקה');
}
</script>
<script>
// ═══════════════════════════════════════════════════════
// 🎯 UI HELPERS
// ═══════════════════════════════════════════════════════
function updateGerm() {
    const plant =
        currentCat === 'manual'
            ? document.getElementById('sPlantManual').value
            : currentCat === 'veg'
                ? document.getElementById('sPlantVeg').value
                : document.getElementById('sPlantFlo').value;

    const dateSeed        = document.getElementById('sDate').value;
    const germTargetInput = document.getElementById('sGermTarget');
    const germInput       = document.getElementById('sGerm');
    const tipsArea        = document.getElementById('tipsArea');

    if (currentCat === 'manual') {
        germTargetInput.value = 7;
        germTargetInput.removeAttribute('readonly');
        if (tipsArea) tipsArea.style.display = 'none';
        return;
    }

    const plantData = plants[currentCat].find(p => p.n === plant);
    if (plantData && dateSeed) {
        germTargetInput.value = plantData.d;
        germTargetInput.setAttribute('readonly', true);
        const germDate = new Date(dateSeed);
        germDate.setDate(germDate.getDate() + plantData.d);
        if (germInput)
            germInput.value = germDate.toLocaleDateString('he-IL');

        if (plantData.tips && tipsArea) {
            let html = '<strong>🌱 מידע חשוב:</strong><br>';
            html += `<strong>עונת זריעה:</strong> ${plantData.season}<br>`;
            if (plantData.tips.זריעה) {
                html += '<strong>זריעה:</strong><br>';
                plantData.tips.זריעה.forEach(t => { html += `• ${t}<br>`; });
            }
            if (plantData.tips.גידול) {
                html += '<strong>גידול:</strong><br>';
                plantData.tips.גידול.forEach(t => { html += `• ${t}<br>`; });
            }
            tipsArea.innerHTML     = html;
            tipsArea.style.display = 'block';
        }
    } else {
        if (germInput)  germInput.value        = '';
        if (tipsArea)   tipsArea.style.display  = 'none';
    }
}

function updatePlantCount() {
    const holeFrom = parseInt(document.getElementById('sHoleFrom').value || 0);
    const holeTo   = parseInt(document.getElementById('sHoleTo').value   || 0);
    const display  = document.getElementById('plantCountDisplay');
    if (!display) return;
    if (holeFrom > 0 && holeTo > 0 && holeTo >= holeFrom) {
        const count         = holeTo - holeFrom + 1;
        display.textContent = `📊 ייווצרו ${count} רשומות`;
        display.style.display = 'block';
    } else {
        display.style.display = 'none';
    }
}

// ═══════════════════════════════════════════════════════
// 📊 TABLE
// ═══════════════════════════════════════════════════════
function renderTable() {
    const tbody = document.getElementById('logBody');
    if (!tbody) return;
    tbody.innerHTML = '';

    const sorted = [...db].sort(
        (a, b) => new Date(b.date || 0) - new Date(a.date || 0)
    );

    sorted.forEach(item => {
        const row = document.createElement('tr');

        const addCell = (text, style) => {
            const td = document.createElement('td');
            td.textContent = text;
            if (style) td.style.cssText = style;
            row.appendChild(td);
            return td;
        };

        addCell(item.date
            ? new Date(item.date).toLocaleDateString('he-IL') : '-');

        const typeCell  = document.createElement('td');
        const typeBadge = document.createElement('span');
        typeBadge.className   = `badge badge-${item.type}`;
        typeBadge.textContent =
            item.type === 'seed'        ? 'זריעה'  :
            item.type === 'hydro'       ? 'שתילה' :
            item.type === 'water'       ? 'מדדים' :
            item.type === 'calibration' ? 'כיול'  : item.type;
        typeCell.appendChild(typeBadge);
        row.appendChild(typeCell);

        addCell(item.plant || '-');
        addCell(item.location?.cycle || '-');
        addCell(item.location?.tray  || '-');

        const loc =
            item.type === 'seed'
                ? `גומה ${item.location?.hole || '-'}`
                : item.type === 'hydro'
                    ? `צד ${item.hydroLoc?.side || '-'}, חור ${item.hydroLoc?.hole || '-'}`
                    : '-';
        addCell(loc);

        const germCell = document.createElement('td');
        if (item.type === 'seed' && item.germActual) {
            const expected = new Date(item.germExpected);
            const actual   = new Date(item.germActual);
            const diff     = Math.floor(
                (actual - expected) / (1000 * 60 * 60 * 24)
            );
            germCell.textContent = actual.toLocaleDateString('he-IL');
            germCell.className   =
                diff < 0 ? 'germinated-early' :
                diff > 0 ? 'germinated-late'  : '';
            germCell.title =
                diff < 0 ? `מוקדם ב-${Math.abs(diff)} ימים` :
                diff > 0 ? `מאוחר ב-${diff} ימים`          :
                           'בדיוק בזמן';
        } else { germCell.textContent = '-'; }
        row.appendChild(germCell);

        const mCell = document.createElement('td');
        if (item.type === 'water') {
            const mx = [];
            if (item.ph   > 0) mx.push(`pH:${item.ph}`);
            if (item.ec   > 0) mx.push(`EC:${item.ec}`);
            if (item.temp > 0) mx.push(`T:${item.temp}°`);
            if (item.do   > 0) mx.push(`DO:${item.do}%`);
            mCell.textContent  = mx.join(' | ');
            mCell.style.fontSize = '10px';
        } else if (item.type === 'calibration') {
            mCell.textContent  = item.sensors || '-';
            mCell.style.fontSize = '10px';
        } else { mCell.textContent = '-'; }
        row.appendChild(mCell);

        const imgCell = document.createElement('td');
        if (item.img) {
            const thumb     = document.createElement('img');
            thumb.src       = item.img;
            thumb.className = 'thumb';
            thumb.onclick   = () => {
                const modal = document.createElement('div');
                modal.style.cssText =
                    'position:fixed;top:0;left:0;width:100%;height:100%;' +
                    'background:rgba(0,0,0,0.9);display:flex;' +
                    'align-items:center;justify-content:center;z-index:9999;';
                modal.onclick = () => modal.remove();
                const bigImg = document.createElement('img');
                bigImg.src         = item.img;
                bigImg.style.cssText =
                    'max-width:90%;max-height:90%;border-radius:10px;';
                modal.appendChild(bigImg);
                document.body.appendChild(modal);
            };
            imgCell.appendChild(thumb);
        } else { imgCell.textContent = '-'; }
        row.appendChild(imgCell);

        addCell(item.notes || '-', 'font-size:10px;');

        const actionsCell = document.createElement('td');
        actionsCell.style.whiteSpace = 'nowrap';

        if (item.type === 'seed' && item.status === 'active') {
            if (!item.germActual) {
                const gb = document.createElement('button');
                gb.textContent = '🌱';
                gb.className   = 'action-btn btn-germinated';
                gb.title       = 'סמן כנבט';
                gb.onclick     = () => markGerminated(item.id);
                actionsCell.appendChild(gb);
            }
            const tb = document.createElement('button');
            tb.textContent = '💧';
            tb.className   = 'action-btn btn-transfer';
            tb.title       = 'העבר להידרו';
            tb.onclick     = () => transferToHydro(item.id);
            actionsCell.appendChild(tb);

            const db2 = document.createElement('button');
            db2.textContent = '🗑️';
            db2.className   = 'action-btn btn-destroy';
            db2.title       = 'סמן כהושמד';
            db2.onclick     = () => harvestPlant(item.id);
            actionsCell.appendChild(db2);
        }
        if (item.type === 'hydro' && item.status === 'active') {
            const hb = document.createElement('button');
            hb.textContent = '🌾';
            hb.className   = 'action-btn btn-harvest';
            hb.title       = 'סמן כנקצר';
            hb.onclick     = () => harvestPlant(item.id);
            actionsCell.appendChild(hb);
        }
        const delBtn = document.createElement('button');
        delBtn.textContent = '❌';
        delBtn.className   = 'btn-del';
        delBtn.onclick     = () => deleteItem(item.id);
        actionsCell.appendChild(delBtn);
        row.appendChild(actionsCell);

        tbody.appendChild(row);
    });
}

// ═══════════════════════════════════════════════════════
// 🔍 SEARCH & FILTER
// ═══════════════════════════════════════════════════════
function searchTable() {
    const input = document.getElementById('searchInput').value.toLowerCase();
    const rows  = document.getElementById('logBody')
                        .getElementsByTagName('tr');
    for (const row of rows) {
        row.style.display =
            row.textContent.toLowerCase().includes(input) ? '' : 'none';
    }
}

function applyFilters() {
    const plant    = document.getElementById('fPlant').value;
    const cycle    = document.getElementById('fCycle').value;
    const tray     = document.getElementById('fTray').value;
    const type     = document.getElementById('fType').value;
    const dateFrom = document.getElementById('fDateFrom').value;
    const dateTo   = document.getElementById('fDateTo').value;
    const rows     = document.getElementById('logBody')
                        .getElementsByTagName('tr');

    for (let i = 0; i < rows.length; i++) {
        const cells = rows[i].cells;
        if (!cells || cells.length === 0) continue;

        const rowDate = cells[0].textContent.split('.').reverse().join('-');
        const item    = db.find(it => it.date === rowDate);
        if (!item) continue;

        let show = true;
        if (plant    && item.plant           !== plant)    show = false;
        if (cycle    && item.location?.cycle !== cycle)    show = false;
        if (tray     && item.location?.tray  !== tray)     show = false;
        if (type     && item.type            !== type)     show = false;
        if (dateFrom && new Date(item.date) < new Date(dateFrom)) show = false;
        if (dateTo   && new Date(item.date) > new Date(dateTo))   show = false;

        rows[i].style.display = show ? '' : 'none';
    }
}

function resetFilters() {
    ['fPlant','fCycle','fTray','fType','fDateFrom','fDateTo','searchInput']
        .forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        });
    const rows = document.getElementById('logBody').getElementsByTagName('tr');
    for (const row of rows) row.style.display = '';
}

function populateFilters() {
    const plantSet = new Set();
    const cycleSet = new Set();
    const traySet  = new Set();

    db.forEach(item => {
        if (item.plant)           plantSet.add(item.plant);
        if (item.location?.cycle) cycleSet.add(item.location.cycle);
        if (item.location?.tray)  traySet.add(item.location.tray);
    });

    const fill = (id, set) => {
        const sel = document.getElementById(id);
        if (!sel) return;
        const cur = sel.value;
        sel.innerHTML = '<option value="">הכל</option>';
        [...set].sort().forEach(v => {
            const o = document.createElement('option');
            o.value = v; o.textContent = v;
            sel.appendChild(o);
        });
        if ([...set].includes(cur)) sel.value = cur;
    };

    fill('fPlant', plantSet);
    fill('fCycle', cycleSet);
    fill('fTray',  traySet);
}
</script>
<script>
// ═══════════════════════════════════════════════════════
// 📈 CHARTS
// ═══════════════════════════════════════════════════════
function destroyChart(key) {
    if (charts[key]) {
        charts[key].destroy();
        charts[key] = null;
    }
}

function buildChart(key, canvasId, label, color, min, max, dataKey, data, labels) {
    destroyChart(key);

    const ctx = document.getElementById(canvasId);
    if (!ctx) return;

    const validData = data.filter(v => v !== null && !isNaN(v));
    const pad       = (max - min) * 0.2 || 1;
    const yMin = validData.length > 0
        ? Math.min(min - pad, Math.min(...validData))
        : min - pad;
    const yMax = validData.length > 0
        ? Math.max(max + pad, Math.max(...validData))
        : max + pad;

    const borderRGB = color;
    const fillRGB   = color.replace('rgb(', 'rgba(').replace(')', ',0.1)');

    charts[key] = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [{
                label,
                data,
                borderColor:     borderRGB,
                backgroundColor: fillRGB,
                borderWidth:     2,
                pointRadius:     3,
                tension:         0.3,
                fill:            true,
                spanGaps:        true
            }]
        },
        options: {
            responsive:           true,
            maintainAspectRatio: false,
            animation:           false,
            resizeDelay:         0,
            plugins: {
                legend: { display: true, position: 'top' },
                annotation: {
                    annotations: {
                        minLine: {
                            type:        'line',
                            yMin:        min,
                            yMax:        min,
                            borderColor: '#ff9800',
                            borderWidth: 2,
                            borderDash:  [5, 5],
                            label: {
                                content:  `Min: ${min}`,
                                display:  true,
                                position: 'start',
                                font:     { size: 10 }
                            }
                        },
                        maxLine: {
                            type:        'line',
                            yMin:        max,
                            yMax:        max,
                            borderColor: '#f44336',
                            borderWidth: 2,
                            borderDash:  [5, 5],
                            label: {
                                content:  `Max: ${max}`,
                                display:  true,
                                position: 'start',
                                font:     { size: 10 }
                            }
                        }
                    }
                }
            },
            scales: {
                x: {
                    ticks: { font: { size: 10 }, maxRotation: 45 }
                },
                y: {
                    beginAtZero: false,
                    min:         yMin,
                    max:         yMax,
                    ticks:       { font: { size: 10 } }
                }
            }
        }
    });
}

function updateCharts() {
    const waterData = db
        .filter(i => i.type === 'water')
        .sort((a, b) => new Date(a.date) - new Date(b.date));

    if (waterData.length === 0) {
        ['ph','ec','temp','do'].forEach(k => destroyChart(k));
        return;
    }

    const labels = waterData.map(i =>
        new Date(i.date).toLocaleDateString('he-IL')
    );
    const l = getLimits();

    buildChart('ph',   'chartPH',   'pH',            'rgb(33,150,243)',
        l.phMin, l.phMax, 'ph',   waterData.map(i => i.ph   ?? null), labels);
    buildChart('ec',   'chartEC',   'EC (mS/cm)',     'rgb(76,175,80)',
        l.ecMin, l.ecMax, 'ec',   waterData.map(i => i.ec   ?? null), labels);
    buildChart('temp', 'chartTemp', 'טמפרטורה (°C)', 'rgb(255,87,34)',
        l.tmMin, l.tmMax, 'temp', waterData.map(i => i.temp ?? null), labels);
    buildChart('do',   'chartDO',   'DO (%)',         'rgb(156,39,176)',
        l.doMin, l.doMax, 'do',   waterData.map(i => i.do   ?? null), labels);
}

// ═══════════════════════════════════════════════════════
// 🗂️ REPORTS
// ═══════════════════════════════════════════════════════
function generateReports() {
    const reportDiv = document.getElementById('reportList');
    if (!reportDiv) return;
    reportDiv.innerHTML = '';

    const activePlants = db.filter(i =>
        (i.type === 'seed' || i.type === 'hydro') &&
        i.status === 'active'
    );
    const plantGroups = {};
    activePlants.forEach(item => {
        if (!plantGroups[item.plant]) plantGroups[item.plant] = [];
        plantGroups[item.plant].push(item);
    });

    if (Object.keys(plantGroups).length === 0) {
        reportDiv.innerHTML =
            '<div class="info-box">📭 אין צמחים פעילים למעקב</div>';
        return;
    }

    for (const [plant, items] of Object.entries(plantGroups)) {
        const card     = document.createElement('div');
        card.className = 'card';
        card.style.marginBottom = '15px';

        const plantData =
            plants.veg.find(p => p.n === plant) ||
            plants.flo.find(p => p.n === plant);

        let html = `
            <h3>🌱 ${plant}</h3>
            <p style="font-size:12px;color:#666;">
                סך הכל: ${items.length} יחידות פעילות
            </p>`;

        if (plantData) {
            html += `<div class="info-box">
                <strong>עונת זריעה:</strong> ${plantData.season}<br>
                <strong>ימי הצצה:</strong> ${plantData.d} ימים<br>`;
            if (plantData.tips?.זריעה) {
                html += '<strong>זריעה:</strong><br>';
                plantData.tips.זריעה.forEach(t => { html += `• ${t}<br>`; });
            }
            if (plantData.tips?.גידול) {
                html += '<strong>גידול:</strong><br>';
                plantData.tips.גידול.forEach(t => { html += `• ${t}<br>`; });
            }
            html += '</div>';
        }

        html += `
            <table style="font-size:10px;margin-top:10px;">
                <thead>
                    <tr>
                        <th>תאריך</th>
                        <th>מיקום</th>
                        <th>סטטוס</th>
                    </tr>
                </thead>
                <tbody>`;

        items.forEach(item => {
            const loc = item.type === 'seed'
                ? `מחזור ${item.location?.cycle||'-'}, ` +
                  `מגש ${item.location?.tray||'-'}, ` +
                  `גומה ${item.location?.hole||'-'}`
                : `הידרו - צד ${item.hydroLoc?.side||'-'}, ` +
                  `חור ${item.hydroLoc?.hole||'-'}`;
            html += `<tr>
                <td>${item.date
                    ? new Date(item.date).toLocaleDateString('he-IL')
                    : '-'}</td>
                <td>${loc}</td>
                <td>${item.germActual ? '✅ נבט' : 'פעיל'}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        card.innerHTML = html;
        reportDiv.appendChild(card);
    }

    const lastChange = localStorage.getItem('lastWaterChange');
    if (lastChange) {
        const nextDate = new Date(lastChange);
        nextDate.setMonth(nextDate.getMonth() + 3);
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        if (nextDate < today) {
            const alertCard = document.createElement('div');
            alertCard.className     = 'card';
            alertCard.style.cssText =
                'background:#ffebee;border-right:4px solid var(--error);';
            alertCard.innerHTML =
                `<h3 style="color:var(--error);">⚠️ התראת החלפת מים</h3>
                 <p>אחרונה: ${new Date(lastChange)
                     .toLocaleDateString('he-IL')}</p>
                 <p><strong>יש להחליף מים בהקדם!</strong></p>`;
            reportDiv.insertBefore(alertCard, reportDiv.firstChild);
        }
    }

    const calibrations = db
        .filter(i => i.type === 'calibration')
        .sort((a, b) => new Date(b.date) - new Date(a.date));

    const latest = { pH: null, EC: null, DO: null };
    calibrations.forEach(cal => {
        if (cal.sensors) {
            if (cal.sensors.includes('pH') && !latest.pH) latest.pH = cal.date;
            if (cal.sensors.includes('EC') && !latest.EC) latest.EC = cal.date;
            if (cal.sensors.includes('DO') && !latest.DO) latest.DO = cal.date;
        }
    });

    const today2       = new Date();
    const sevenDaysAgo = new Date();
    sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

    const warnings = [];
    for (const [sensor, date] of Object.entries(latest)) {
        if (!date) {
            warnings.push(`${sensor} - לא בוצע כיול מעולם`);
        } else if (new Date(date) < sevenDaysAgo) {
            warnings.push(
                `${sensor} - לא כויל ` +
                `${Math.floor(
                    (today2 - new Date(date)) / (1000 * 60 * 60 * 24)
                )} ימים`
            );
        }
    }

    if (warnings.length > 0) {
        const calAlert = document.createElement('div');
        calAlert.className     = 'card';
        calAlert.style.cssText =
            'background:#fff3e0;border-right:4px solid var(--warning);';
        let h =
            `<h3 style="color:var(--warning);">⚙️ התראת כיול</h3>
             <ul style="margin:0;padding-right:20px;font-size:12px;">`;
        warnings.forEach(w => { h += `<li>${w}</li>`; });
        h += '</ul>';
        calAlert.innerHTML = h;
        reportDiv.insertBefore(calAlert, reportDiv.firstChild);
    }
}

// ═══════════════════════════════════════════════════════
// 📤 EXPORT
// ═══════════════════════════════════════════════════════
async function exportData() {
    if (db.length === 0) { alert('❌ אין נתונים לייצוא'); return; }
    try {
        const zip     = new JSZip();
        const headers = [
            'תאריך','סוג','צמח','מחזור','מגש','גומה','צד הידרו','חור הידרו',
            'pH','EC','טמפרטורה','DO','סטטוס','תאריך נביטה צפוי',
            'תאריך נביטה בפועל','ימי הצצה','מצע','מקור שתיל','חיישנים שכוילו','הערות'
        ];
        const csvEscape = v => {
            if (v === null || v === undefined) return '';
            return '"' + String(v).replace(/"/g, '""') + '"';
        };
        const headerRow = headers.map(h => csvEscape(h)).join(',');
        const dataRows  = db.map(item => {
            const typeH =
                item.type === 'seed'        ? 'זריעה'    :
                item.type === 'hydro'       ? 'שתילה'    :
                item.type === 'water'       ? 'מדדי מים' :
                item.type === 'calibration' ? 'כיול'     : (item.type || '');
            const statusH =
                item.status === 'active'      ? 'פעיל'  :
                item.status === 'harvested'   ? 'נקצר'  :
                item.status === 'destroyed'   ? 'הושמד' :
                item.status === 'transferred' ? 'הועבר' : (item.status || '');
            return [
                item.date || '', typeH, item.plant || '',
                item.location?.cycle || '', item.location?.tray  || '',
                item.location?.hole  || '', item.hydroLoc?.side  || '',
                item.hydroLoc?.hole  || '', item.ph   ?? '',
                item.ec   ?? '',            item.temp ?? '',
                item.do   ?? '',            statusH,
                item.germExpected || '',    item.germActual  || '',
                item.germDays    || '',     item.substrate   || '',
                item.source      || '',     item.sensors     || '',
                item.notes       || ''
            ].map(v => csvEscape(v)).join(',');
        });

        const BOM = '\uFEFF';
        zip.file(
            'growmanager_data.csv',
            BOM + headerRow + '\n' + dataRows.join('\n')
        );

        const imgFolder = zip.folder('images');
        db.forEach((item, index) => {
            if (item.img && item.img.startsWith('data:image')) {
                const safeName = (item.plant || 'unknown')
                    .replace(/[^a-zA-Z\u0590-\u05FF0-9]/g, '_');
                imgFolder.file(
                    `${item.type}_${safeName}_${index}.jpg`,
                    item.img.split(',')[1],
                    { base64: true }
                );
            }
        });

        zip.file('README.txt',
            '\uFEFF' +
            'GrowManager PRO - ייצוא נתונים\n' +
            '================================\n\n' +
            'תאריך ייצוא: ' + new Date().toLocaleDateString('he-IL') + '\n' +
            'סך הכל רשומות: ' + db.length + '\n\n' +
            'הוראות פתיחה באקסל:\n' +
            '1. פתח את הקובץ growmanager_data.csv\n' +
            '2. אם מופיע גיבריש - ודא קידוד UTF-8\n'
        );

        const content = await zip.generateAsync({ type: 'blob' });
        const url     = URL.createObjectURL(content);
        const a       = document.createElement('a');
        a.href        = url;
        a.download    = `GrowManager_Export_${
            new Date().toISOString().split('T')[0]
        }.zip`;
        a.click();
        URL.revokeObjectURL(url);
        alert('✅ הנתונים יוצאו בהצלחה!');
    } catch (error) {
        console.error('❌ Export error:', error);
        alert('❌ שגיאה בייצוא: ' + error.message);
    }
}

function refreshAll() {
    renderTable();
    populateFilters();
    generateReports();
}
</script>

<script>
// ═══════════════════════════════════════════════════════
// 🚀 INIT – EVENT LISTENERS
// ═══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
    console.log('🚀 GrowManager PRO - Initializing...');

    loadFromLocal();
    loadLimits();
    loadWaterChangeDate();

    const today = new Date().toISOString().split('T')[0];
    document.getElementById('sDate').value           = today;
    document.getElementById('hDate').value           = today;
    document.getElementById('wDate').value           = today;
    document.getElementById('calibrationDate').value = today;

    const vegSelect = document.getElementById('sPlantVeg');
    const floSelect = document.getElementById('sPlantFlo');
    plants.veg.forEach(p => {
        const o = document.createElement('option');
        o.value = p.n; o.textContent = p.n;
        vegSelect.appendChild(o);
    });
    plants.flo.forEach(p => {
        const o = document.createElement('option');
        o.value = p.n; o.textContent = p.n;
        floSelect.appendChild(o);
    });

    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const panel = item.dataset.panel;
            document.querySelectorAll('.nav-item')
                .forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.panel')
                .forEach(p => p.classList.remove('active'));
            item.classList.add('active');
            document.getElementById(panel).classList.add('active');
            if (panel === 'dataPanel')   updateCharts();
            if (panel === 'reportPanel') generateReports();
        });
    });

    document.querySelectorAll('[data-substrate]').forEach(opt => {
        opt.addEventListener('click', () => {
            document.querySelectorAll('[data-substrate]')
                .forEach(o => o.classList.remove('active-opt'));
            opt.classList.add('active-opt');
            currentSubstrate = opt.dataset.substrate;
            const lblTray = document.getElementById('lblTray');
            if (lblTray) {
                if      (currentSubstrate === 'מגשי פלסטיק') lblTray.textContent = 'מגש';
                else if (currentSubstrate === 'צמר סלעים')   lblTray.textContent = 'לוח';
                else                                           lblTray.textContent = 'עציץ';
            }
        });
    });

    document.querySelectorAll('[data-cat]').forEach(opt => {
        opt.addEventListener('click', () => {
            document.querySelectorAll('[data-cat]')
                .forEach(o => o.classList.remove('active-opt'));
            opt.classList.add('active-opt');
            currentCat = opt.dataset.cat;

            document.getElementById('sPlantVeg')
                .classList.toggle('hidden', currentCat !== 'veg');
            document.getElementById('sPlantFlo')
                .classList.toggle('hidden', currentCat !== 'flo');
            document.getElementById('sPlantManual')
                .classList.toggle('hidden', currentCat !== 'manual');

            if (currentCat !== 'manual') {
                document.getElementById('sGermTarget')
                    .setAttribute('readonly', true);
            }
            updateGerm();
        });
    });

    document.getElementById('sPlantVeg')
        .addEventListener('change', updateGerm);
    document.getElementById('sPlantFlo')
        .addEventListener('change', updateGerm);
    document.getElementById('sPlantManual')
        .addEventListener('input',  updateGerm);
    document.getElementById('sDate')
        .addEventListener('change', updateGerm);
    document.getElementById('sHoleFrom')
        .addEventListener('input', updatePlantCount);
    document.getElementById('sHoleTo')
        .addEventListener('input', updatePlantCount);

    document.getElementById('sFile').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader    = new FileReader();
        reader.onload   = ev => {
            activeImg               = ev.target.result;
            const preview           = document.getElementById('sPreview');
            preview.src             = activeImg;
            preview.style.display   = 'block';
        };
        reader.readAsDataURL(file);
    });

    document.getElementById('btnSaveSeed')
        .addEventListener('click', () => saveData('seed'));
    document.getElementById('btnSaveHydro')
        .addEventListener('click', () => saveData('hydro'));
    document.getElementById('btnSaveWater')
        .addEventListener('click', () => saveData('water'));
    document.getElementById('btnSaveCalibration')
        .addEventListener('click', () => saveData('calibration'));

    ['wPH','wEC','wTemp','wDO'].forEach(id => {
        document.getElementById(id)
            .addEventListener('input', checkLimits);
    });

    document.getElementById('lastWaterChange')
        .addEventListener('change', updateWaterChangeDate);

    updateGerm();
    updatePlantCount();
    refreshAll();

    console.log('✅ GrowManager PRO - Ready!');
});
</script>

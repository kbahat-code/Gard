<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌱 GrowManager PRO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            font-size: 11px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 15px 20px;
            text-align: center;
            position: relative;
        }
        .header h1 {
            font-size: 20px;
            margin-bottom: 5px;
        }
        .user-info {
            font-size: 10px;
            opacity: 0.9;
        }
        .logout-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.2);
            border: 1px solid white;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 10px;
        }
        .delete-account-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,0,0,0.3);
            border: 1px solid white;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 10px;
        }
        .nav-bar {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
            overflow-x: auto;
        }
        .nav-btn {
            flex: 1;
            min-width: 80px;
            padding: 12px 10px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 10px;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
        }
        .nav-btn:hover {
            background: #e9ecef;
        }
        .nav-btn.active {
            background: white;
            border-bottom-color: #11998e;
            font-weight: bold;
        }
        .panel {
            display: none;
            padding: 20px;
            animation: fadeIn 0.3s;
        }
        .panel.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            font-size: 10px;
            color: #495057;
        }
        .form-control, select, input[type="text"], input[type="number"], input[type="date"], textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            font-size: 11px;
            font-family: inherit;
        }
        .form-control:focus {
            outline: none;
            border-color: #11998e;
            box-shadow: 0 0 0 3px rgba(17,153,142,0.1);
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.3s;
            margin: 5px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(17,153,142,0.3);
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-warning {
            background: #ffc107;
            color: #212529;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 10px;
        }
        .data-table th {
            background: #11998e;
            color: white;
            padding: 10px 8px;
            text-align: center;
            font-size: 10px;
        }
        .data-table td {
            border: 1px solid #dee2e6;
            padding: 8px;
            text-align: center;
        }
        .data-table tr:nth-child(even) {
            background: #f8f9fa;
        }
        .data-table tr:hover {
            background: #e9ecef;
        }
        .status-active { background: #d4edda; color: #155724; }
        .status-transferred { background: #cce5ff; color: #004085; }
        .status-destroyed { background: #f8d7da; color: #721c24; }
        .status-harvested { background: #fff3cd; color: #856404; }
        .germ-early { background: #d4edda; }
        .germ-on-time { background: #fff3cd; }
        .germ-late { background: #f8d7da; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 10000;
            animation: slideUp 0.3s;
            font-size: 11px;
        }
        @keyframes slideUp {
            from { transform: translate(-50%, 100px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        .toast.success { background: #28a745; }
        .toast.error { background: #dc3545; }
        .toast.warning { background: #ffc107; color: #212529; }
        .toast.info { background: #17a2b8; }
        .action-btn {
            padding: 5px 10px;
            margin: 2px;
            font-size: 9px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .chart-container {
            margin: 20px 0;
            padding: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .filter-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .col {
            flex: 1;
            min-width: 150px;
        }
        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 11px;
        }
        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 90%;
            max-height: 90%;
            overflow: auto;
        }
        .seasonal-tips {
            background: #e7f3ff;
            border-left: 4px solid #11998e;
            padding: 12px;
            margin: 15px 0;
            border-radius: 5px;
            font-size: 10px;
        }
        .badge {
            background: #dc3545;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 9px;
            margin-left: 5px;
        }
        @media (max-width: 768px) {
            body { font-size: 10px; }
            .header h1 { font-size: 16px; }
            .nav-btn { font-size: 9px; padding: 10px 5px; }
            .data-table { font-size: 9px; }
            .data-table th, .data-table td { padding: 6px 4px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <button class="logout-btn" onclick="logout()">🚪 יציאה</button>
        <button class="delete-account-btn" onclick="deleteAccount()">🗑️ מחק חשבון</button>
        <h1>🌱 GrowManager PRO</h1>
        <div class="user-info">
            משתמש: <span id="userEmail">טוען...</span> | 
            סנכרון: <span id="syncStatus">⏳ ממתין</span>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn active" onclick="showPanel('seedPanel')">🌱 זריעה</button>
        <button class="nav-btn" onclick="showPanel('hydroPanel')">💧 הידרופוניקה</button>
        <button class="nav-btn" onclick="showPanel('waterPanel')">🧪 מדידות מים</button>
        <button class="nav-btn" onclick="showPanel('calibrationPanel')">⚙️ כיולים</button>
        <button class="nav-btn" onclick="showPanel('logPanel')">📋 יומן</button>
        <button class="nav-btn" onclick="showPanel('chartPanel')">📊 גרפים</button>
        <button class="nav-btn" onclick="showPanel('reportPanel')">📈 דוחות</button>
        <button class="nav-btn" onclick="showPanel('settingsPanel')">⚙️ הגדרות</button>
        <button class="nav-btn" onclick="showPanel('maintenancePanel')">
            🔧 תחזוקה <span id="alertBadge" class="badge" style="display:none;">0</span>
        </button>
    </div>

    <!-- SEED PANEL -->
    <div id="seedPanel" class="panel active">
        <h2>🌱 רישום זריעה</h2>
        <div id="seasonalTipsContainer"></div>
        
        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label>תאריך זריעה:</label>
                    <input type="date" id="seedDate" class="form-control">
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label>צמח:</label>
                    <select id="seedPlant" class="form-control" onchange="updateSeasonalTips()">
                        <option value="">בחר צמח</option>
                        <option value="חסה">חסה</option>
                        <option value="בזיליקום">בזיליקום</option>
                        <option value="עגבנייה">עגבנייה</option>
                        <option value="מלפפון">מלפפון</option>
                        <option value="פלפל">פלפל</option>
                        <option value="תרד">תרד</option>
                        <option value="קייל">קייל</option>
                        <option value="כרוב">כרוב</option>
                        <option value="כרובית">כרובית</option>
                        <option value="ברוקולי">ברוקולי</option>
                        <option value="חציל">חציל</option>
                        <option value="כרוב קילה">כרוב קילה</option>
                        <option value="שום">שום</option>
                        <option value="בצל ירוק">בצל ירוק</option>
                        <option value="גזר">גזר</option>
                        <option value="צנון">צנון</option>
                        <option value="סלק">סלק</option>
                        <option value="פטרוזיליה">פטרוזיליה</option>
                        <option value="כוסברה">כוסברה</option>
                        <option value="שמיר">שמיר</option>
                        <option value="נענע">נענע</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label>סוג מצע:</label>
                    <select id="seedSubstrate" class="form-control" onchange="updateSubstrateLabels()">
                        <option value="Tray">מגשי פלסטיק</option>
                        <option value="Cube">קוביות רוקוול</option>
                        <option value="Pot">עציצים</option>
                    </select>
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label id="trayLabel">מגש:</label>
                    <input type="text" id="seedTray" class="form-control" placeholder="לדוגמה: A1">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label id="holeFromLabel">חור מ-:</label>
                    <input type="number" id="seedHoleFrom" class="form-control" min="1">
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label id="holeToLabel">עד חור:</label>
                    <input type="number" id="seedHoleTo" class="form-control" min="1">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>מטרת נביטה (ימים):</label>
            <input type="number" id="seedGermTarget" class="form-control" placeholder="מספר ימים לנביטה">
        </div>

        <div class="form-group">
            <label>תמונה (אופציונלי):</label>
            <input type="file" id="seedImage" class="form-control" accept="image/*">
        </div>

        <div class="form-group">
            <label>הערות:</label>
            <textarea id="seedNotes" class="form-control" rows="2"></textarea>
        </div>

        <button class="btn btn-primary" onclick="saveSeed()">💾 שמור זריעה</button>
        <button class="btn btn-secondary" onclick="clearSeedForm()">🔄 נקה טופס</button>
    </div>

    <!-- HYDRO PANEL -->
    <div id="hydroPanel" class="panel">
        <h2>💧 העברה להידרופוניקה</h2>
        
        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label>תאריך העברה:</label>
                    <input type="date" id="hydroDate" class="form-control">
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label>מחזור:</label>
                    <input type="text" id="hydroCycle" class="form-control" placeholder="לדוגמה: 2024-01">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label>צד:</label>
                    <select id="hydroSide" class="form-control">
                        <option value="1">1</option>
                        <option value="2">2</option>
                    </select>
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label>חור:</label>
                    <input type="number" id="hydroHole" class="form-control" min="1">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>צמח:</label>
            <select id="hydroPlant" class="form-control">
                <option value="">בחר צמח</option>
                <option value="חסה">חסה</option>
                <option value="בזיליקום">בזיליקום</option>
                <option value="עגבנייה">עגבנייה</option>
                <option value="מלפפון">מלפפון</option>
                <option value="פלפל">פלפל</option>
                <option value="תרד">תרד</option>
                <option value="קייל">קייל</option>
            </select>
        </div>

        <div class="form-group">
            <label>תמונה (אופציונלי):</label>
            <input type="file" id="hydroImage" class="form-control" accept="image/*">
        </div>

        <div class="form-group">
            <label>הערות:</label>
            <textarea id="hydroNotes" class="form-control" rows="2"></textarea>
        </div>

        <button class="btn btn-primary" onclick="saveHydro()">💾 שמור העברה</button>
        <button class="btn btn-secondary" onclick="clearHydroForm()">🔄 נקה טופס</button>
    </div>

    <!-- WATER PANEL -->
    <div id="waterPanel" class="panel">
        <h2>🧪 מדידות מים</h2>
        
        <div class="row">
            <div class="form-group">
                <label>תאריך מדידה:</label>
                <input type="date" id="waterDate" class="form-control">
            </div>
        </div>

        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label>pH:</label>
                    <input type="number" id="waterPH" class="form-control" step="0.1" min="0" max="14" placeholder="5.5-6.5">
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label>EC (mS/cm):</label>
                    <input type="number" id="waterEC" class="form-control" step="0.1" min="0" placeholder="1.2-2.0">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label>חמצן מומס (%):</label>
                    <input type="number" id="waterDO" class="form-control" step="0.1" min="0" max="100" placeholder="80-100">
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label>טמפרטורה (°C):</label>
                    <input type="number" id="waterTemp" class="form-control" step="0.1" placeholder="18-24">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>הערות:</label>
            <textarea id="waterNotes" class="form-control" rows="2"></textarea>
        </div>

        <button class="btn btn-primary" onclick="saveWater()">💾 שמור מדידה</button>
        <button class="btn btn-secondary" onclick="clearWaterForm()">🔄 נקה טופס</button>
    </div>

    <!-- CALIBRATION PANEL -->
    <div id="calibrationPanel" class="panel">
        <h2>⚙️ כיולים</h2>
        
        <div class="form-group">
            <label>תאריך כיול:</label>
            <input type="date" id="calibrationDate" class="form-control">
        </div>

        <div class="form-group">
            <label>חיישן:</label>
            <select id="calibrationSensor" class="form-control">
                <option value="pH">pH</option>
                <option value="EC">EC</option>
                <option value="DO">חמצן מומס</option>
                <option value="Temp">טמפרטורה</option>
            </select>
        </div>

        <div class="form-group">
            <label>ערך כיול:</label>
            <input type="text" id="calibrationValue" class="form-control" placeholder="ערך התייחסות">
        </div>

        <div class="form-group">
            <label>הערות:</label>
            <textarea id="calibrationNotes" class="form-control" rows="2"></textarea>
        </div>

        <button class="btn btn-primary" onclick="saveCalibration()">💾 שמור כיול</button>
        <button class="btn btn-secondary" onclick="clearCalibrationForm()">🔄 נקה טופס</button>
    </div>

    <!-- LOG PANEL -->
    <div id="logPanel" class="panel">
        <h2>📋 יומן פעילות</h2>
        
        <div class="filter-section">
            <h3 style="margin-bottom: 10px;">🔍 סינון</h3>
            <div class="row">
                <div class="col">
                    <select id="filterType" class="form-control" onchange="render()">
                        <option value="">כל הסוגים</option>
                        <option value="seed">זריעה</option>
                        <option value="hydro">הידרופוניקה</option>
                        <option value="water">מדידות מים</option>
                        <option value="calibration">כיולים</option>
                    </select>
                </div>
                <div class="col">
                    <select id="filterPlant" class="form-control" onchange="render()">
                        <option value="">כל הצמחים</option>
                    </select>
                </div>
                <div class="col">
                    <input type="text" id="filterCycle" class="form-control" placeholder="מחזור" onchange="render()">
                </div>
                <div class="col">
                    <input type="text" id="filterTray" class="form-control" placeholder="מגש/קוביה/עציץ" onchange="render()">
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <input type="date" id="filterDateFrom" class="form-control" onchange="render()">
                </div>
                <div class="col">
                    <input type="date" id="filterDateTo" class="form-control" onchange="render()">
                </div>
                <div class="col">
                    <button class="btn btn-secondary" onclick="clearFilters()">🔄 נקה סינון</button>
                </div>
            </div>
        </div>

        <div style="overflow-x: auto;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>תאריך</th>
                        <th>סוג</th>
                        <th>צמח</th>
                        <th>מחזור</th>
                        <th>מיקום</th>
                        <th>סטטוס</th>
                        <th>נביטה</th>
                        <th>pH</th>
                        <th>EC</th>
                        <th>הערות</th>
                        <th>פעולות</th>
                    </tr>
                </thead>
                <tbody id="logTbody"></tbody>
            </table>
        </div>
    </div>

    <!-- CHART PANEL -->
    <div id="chartPanel" class="panel">
        <h2>📊 גרפים</h2>
        
        <div class="row">
            <div class="col">
                <div class="chart-container">
                    <canvas id="phChart"></canvas>
                </div>
            </div>
            <div class="col">
                <div class="chart-container">
                    <canvas id="ecChart"></canvas>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col">
                <div class="chart-container">
                    <canvas id="tempChart"></canvas>
                </div>
            </div>
            <div class="col">
                <div class="chart-container">
                    <canvas id="doChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- REPORT PANEL -->
    <div id="reportPanel" class="panel">
        <h2>📈 דוחות</h2>
        <div id="reportContent"></div>
        <button class="btn btn-primary" onclick="exportToExcel()">📊 ייצא לאקסל</button>
    </div>

    <!-- SETTINGS PANEL -->
    <div id="settingsPanel" class="panel">
        <h2>⚙️ הגדרות</h2>
        
        <h3>🎯 גבולות איכות מים</h3>
        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label>pH מינימום:</label>
                    <input type="number" id="settingPhMin" class="form-control" step="0.1" value="5.5">
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label>pH מקסימום:</label>
                    <input type="number" id="settingPhMax" class="form-control" step="0.1" value="6.5">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <div class="form-group">

// LocalStorage & Firestore
function loadLS() {
    const stored = localStorage.getItem('growData');
    if (stored) {
        try {
            db = JSON.parse(stored);
        } catch (err) {
            console.error('Error parsing localStorage:', err);
            db = [];
        }
    }
    render();
}

function saveLS() {
    localStorage.setItem('growData', JSON.stringify(db));
}

function listenToFirestore() {
    if (!currentUser) return;
    db2.collection('users').doc(currentUser.uid).collection('growData').onSnapshot(snapshot => {
        const cloudData = [];
        snapshot.forEach(doc => cloudData.push({ id: doc.id, ...doc.data() }));
        
        // Merge logic: prefer cloud data if timestamp is newer
        cloudData.forEach(cloudRec => {
            const localIndex = db.findIndex(r => r.id === cloudRec.id);
            if (localIndex === -1) {
                db.push(cloudRec);
            } else {
                if (cloudRec.timestamp > db[localIndex].timestamp) {
                    db[localIndex] = cloudRec;
                }
            }
        });
        
        saveLS();
        render();
        $('syncStatus').innerHTML = '✅ מסונכרן';
        setTimeout(() => $('syncStatus').innerHTML = '⏳ ממתין', 3000);
    });
}

const syncToFirestore = debounce(async () => {
    if (!currentUser) return;
    
    const batch = db2.batch();
    db.forEach(rec => {
        const docRef = db2.collection('users').doc(currentUser.uid).collection('growData').doc(rec.id);
        batch.set(docRef, rec, { merge: true });
    });
    
    try {
        await batch.commit();
        $('syncStatus').innerHTML = '✅ מסונכרן';
        setTimeout(() => $('syncStatus').innerHTML = '⏳ ממתין', 2000);
    } catch (err) {
        console.error('Sync error:', err);
        $('syncStatus').innerHTML = '❌ שגיאת סנכרון';
    }
}, 5000);

function debounce(func, wait) {
    let timeout;
    return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
    };
}

function throttle(func, limit) {
    let inThrottle;
    return function(...args) {
        if (!inThrottle) {
            func.apply(this, args);
            inThrottle = true;
            setTimeout(() => inThrottle = false, limit);
        }
    };
}

// Maintenance Alerts
function checkMaintenanceAlerts() {
    const alerts = [];
    const now = new Date();
    
    if (growSettings.waterChangeDate) {
        const lastChange = new Date(growSettings.waterChangeDate);
        const daysSince = Math.floor((now - lastChange) / (1000 * 60 * 60 * 24));
        const daysUntilNext = 90 - daysSince;
        
        if (daysUntilNext <= 7 && daysUntilNext > 0) {
            alerts.push({
                type: 'warning',
                message: `⚠️ החלפת מי תזונה נדרשת בעוד ${daysUntilNext} ימים`
            });
        } else if (daysUntilNext <= 0) {
            alerts.push({
                type: 'danger',
                message: `🚨 החלפת מי תזונה באיחור של ${Math.abs(daysUntilNext)} ימים!`
            });
        }
    }
    
    if (growSettings.calibrationDate) {
        const lastCal = new Date(growSettings.calibrationDate);
        const daysSince = Math.floor((now - lastCal) / (1000 * 60 * 60 * 24));
        const daysUntilNext = 7 - daysSince;
        
        if (daysUntilNext <= 3 && daysUntilNext > 0) {
            alerts.push({
                type: 'warning',
                message: `⚠️ כיול חיישנים נדרש בעוד ${daysUntilNext} ימים`
            });
        } else if (daysUntilNext <= 0) {
            alerts.push({
                type: 'danger',
                message: `🚨 כיול חיישנים באיחור של ${Math.abs(daysUntilNext)} ימים!`
            });
        }
    }
    
    const alertContainer = $('maintenanceAlerts');
    if (alerts.length > 0) {
        alertContainer.innerHTML = alerts.map(a => 
            `<div class="alert alert-${a.type}">${a.message}</div>`
        ).join('');
        
        const badge = $('alertBadge');
        badge.textContent = alerts.length;
        badge.style.display = 'inline-block';
    } else {
        alertContainer.innerHTML = '<div class="alert alert-info">✅ אין התראות תחזוקה</div>';
        $('alertBadge').style.display = 'none';
    }
}

async function saveSeed() {
    const date = $('seedDate').value;
    const plant = $('seedPlant').value;
    const substrate = $('seedSubstrate').value;
    const tray = $('seedTray').value;
    const holeFrom = parseInt($('seedHoleFrom').value);
    const holeTo = parseInt($('seedHoleTo').value);
    const germTarget = parseInt($('seedGermTarget').value);
    const notes = $('seedNotes').value;
    const imageFile = $('seedImage').files[0];
    
    if (!date || !plant || !tray || !holeFrom || !holeTo) {
        showToast('❌ נא למלא את כל השדות הנדרשים', 'error');
        return;
    }
    
    if (holeFrom > holeTo) {
        showToast('❌ חור מ- לא יכול להיות גדול מ-חור עד', 'error');
        return;
    }
    
    let imageData = null;
    if (imageFile) {
        imageData = await readFileAsBase64(imageFile);
    }
    
    const seedDate = new Date(date);
    let germExpected = null;
    if (germTarget) {
        germExpected = new Date(seedDate);
        germExpected.setDate(germExpected.getDate() + germTarget);
        germExpected = germExpected.toISOString().split('T')[0];
    }
    
    for (let hole = holeFrom; hole <= holeTo; hole++) {
        const record = {
            id: generateUniqueId(),
            timestamp: Date.now(),
            type: 'seed',
            date: date,
            plant: plant,
            substrate: substrate,
            tray: tray,
            hole: hole.toString(),
            germTarget: germTarget || null,
            germExpected: germExpected,
            germDate: null,
            status: 'active',
            notes: notes,
            image: imageData
        };
        db.push(record);
    }
    
    saveLS();
    syncToFirestore();
    render();
    clearSeedForm();
    showToast(`✅ נשמרו ${holeTo - holeFrom + 1} זריעות`, 'success');
}

const checkLimits = throttle((ph, ec, temp, doVal) => {

    }
    if (ec < growSettings.ecMin || ec > growSettings.ecMax) {
        alerts.push(`⚠️ EC מחוץ לטווח (${growSettings.ecMin}-${growSettings.ecMax})`);
    }
    if (temp < growSettings.tempMin || temp > growSettings.tempMax) {
        alerts.push(`⚠️ טמפרטורה מחוץ לטווח (${growSettings.tempMin}-${growSettings.tempMax}°C)`);
    }
    if (doVal < growSettings.doMin) {
        alerts.push(`⚠️ חמצן מומס נמוך מ-${growSettings.doMin}%`);
    }
    
    if (alerts.length > 0) {
        showToast(alerts.join('\n'), 'warning');
    }
}, 500);

    render();
    clearCalibrationForm();
    showToast('✅ כיול נשמר', 'success');
}

function clearCalibrationForm() {
    $('calibrationDate').value = new Date().toISOString().split('T')[0];
    $('calibrationSensor').value = 'pH';
    $('calibrationValue').value = '';
    $('calibrationNotes').value = '';
}

// Actions
function markGerminated(id) {
    const germDate = prompt('📅 תאריך נביטה (YYYY-MM-DD):');
    if (!germDate) return;
    
    const record = db.find(r => r.id === id);
    if (record) {
        record.germDate = germDate;
        saveLS();
        syncToFirestore();
        render();
        showToast('✅ תאריך נביטה עודכן', 'success');
    }
}

function transferToHydro(id) {
    const cycle = prompt('מחזור:');
    const side = prompt('צד (1/2):');
    const hole = prompt('חור:');
    
    if (!cycle || !side || !hole) return;
    
    // Check occupancy
    const occupied = db.find(r => 
        r.type === 'hydro' && 
        r.status === 'active' && 
        r.cycle === cycle && 
        r.side === side && 
        r.hole === hole
    );
    
    if (occupied) {
        showToast('❌ מיקום תפוס!', 'error');
        return;
    }
    
    const seedRec = db.find(r => r.id === id);
    if (!seedRec) return;
    
    seedRec.status = 'transferred';
    
    const hydroRec = {
        id: generateUniqueId(),
        timestamp: Date.now(),
        type: 'hydro',
        date: new Date().toISOString().split('T')[0],
        cycle: cycle,
        side: side,
        hole: hole,
        plant: seedRec.plant,
        status: 'active',
        notes: `הועבר מ-${seedRec.tray} חור ${seedRec.hole}`,
        image: seedRec.image
    };
    
    db.push(hydroRec);
    saveLS();
    syncToFirestore();
    render();
    showToast('✅ הועבר להידרופוניקה', 'success');
}

function destroyRecord(id) {
    if (!confirm('להשמיד רשומה זו?')) return;
    
    const record = db.find(r => r.id === id);
    if (record) {
        record.status = 'destroyed';
        saveLS();
        syncToFirestore();
        render();
        showToast('✅ רשומה הושמדה', 'warning');
    }
}

function harvestRecord(id) {
    if (!confirm('לסמן כנקטף?')) return;
    
    const record = db.find(r => r.id === id);
    if (record) {
        record.status = 'harvested';
        saveLS();
        syncToFirestore();
        render();
        showToast('✅ סומן כנקטף', 'success');
    }
}

function deleteRecord(id) {
    if (!confirm('למחוק רשומה זו לצמיתות?')) return;
    
    db = db.filter(r => r.id !== id);
    saveLS();
    syncToFirestore();
    render();
    showToast('✅ רשומה נמחקה', 'info');
}

// Rendering
function render() {
    renderLogTable();
    updateFilterPlants();
}

function updateFilterPlants() {
    const plants = [...new Set(db.filter(r => r.plant).map(r => r.plant))];
    const select = $('filterPlant');
    const current = select.value;
    
    select.innerHTML = '<option value="">כל הצמחים</option>';
    plants.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        select.appendChild(opt);
    });
    
    select.value = current;
}

function renderLogTable() {
    let filtered = db;
    
    if (filter.type) filtered = filtered.filter(r => r.type === filter.type);
    if (filter.plant) filtered = filtered.filter(r => r.plant === filter.plant);
    if (filter.cycle) filtered = filtered.filter(r => r.cycle && r.cycle.includes(filter.cycle));
    if (filter.tray) filtered = filtered.filter(r => r.tray && r.tray.includes(filter.tray));
    if (filter.dateFrom) filtered = filtered.filter(r => r.date >= filter.dateFrom);
    if (filter.dateTo) filtered = filtered.filter(r => r.date <= filter.dateTo);
    
    filtered.sort((a, b) => b.timestamp - a.timestamp);
    
    const tbody = $('logTbody');
    tbody.innerHTML = '';
    
    filtered.forEach(r => {
        const row = document.createElement('tr');
        
        let germCell = '-';
        if (r.type === 'seed') {
            if (r.germDate) {
                const sow = new Date(r.date);
                const germ = new Date(r.germDate);
                const daysTaken = Math.floor((germ - sow) / (1000 * 60 * 60 * 24));
                
                let className = '';
                if (r.germExpected) {
                    const expected = new Date(r.germExpected);
                    if (germ < expected) className = 'germ-early';
                    else if (germ.getTime() === expected.getTime()) className = 'germ-on-time';
                    else className = 'germ-late';
                }
                
                germCell = `<span class="${className}">${r.germDate} (${daysTaken}d)</span>`;
            } else if (r.germExpected) {
                germCell = `צפי: ${r.germExpected}`;
            }
        }
        
        let location = '-';
        if (r.tray && r.hole) location = `${r.tray} #${r.hole}`;
        else if (r.cycle && r.side && r.hole) location = `${r.cycle} צד${r.side} #${r.hole}`;
        
        let phCell = '-', ecCell = '-';
        if (r.type === 'water') {
            phCell = r.ph.toFixed(2);
            ecCell = r.ec.toFixed(2);
        }
        
        let actions = '';
        if (r.type === 'seed' && r.status === 'active') {
            actions += `<button class="action-btn btn-primary" onclick="markGerminated('${r.id}')">🌱</button>`;
            actions += `<button class="action-btn btn-primary" onclick="transferToHydro('${r.id}')">💧</button>`;
        }
        if ((r.type === 'seed' || r.type === 'hydro') && r.status === 'active') {
            actions += `<button class="action-btn btn-warning" onclick="destroyRecord('${r.id}')">🗑️</button>`;
            actions += `<button class="action-btn btn-primary" onclick="harvestRecord('${r.id}')">🌾</button>`;
        }
        actions += `<button class="action-btn btn-danger" onclick="deleteRecord('${r.id}')">❌</button>`;
        if (r.image) {
            actions += `<button class="action-btn btn-secondary" onclick="showImage('${r.image}')">🖼️</button>`;
        }
        
        row.innerHTML = `
            <td>${formatDate(r.date)}</td>
            <td>${translateType(r.type)}</td>
            <td>${r.plant || '-'}</td>
            <td>${r.cycle || '-'}</td>
            <td>${location}</td>
            <td><span class="status-${r.status}">${translateStatus(r.status)}</span></td>
            <td>${germCell}</td>
            <td>${phCell}</td>
            <td>${ecCell}</td>
            <td>${r.notes || '-'}</td>
            <td>${actions}</td>
        `;
        
        tbody.appendChild(row);
    });
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    const d = new Date(dateStr);
    return d.toLocaleDateString('he-IL');
}

function translateType(type) {
    const map = { seed: 'זריעה', hydro: 'הידרו', water: 'מדידה', calibration: 'כיול' };
    return map[type] || type;
}

function translateStatus(status) {
    const map = { active: 'פעיל', transferred: 'הועבר', destroyed: 'הושמד', harvested: 'נקטף' };
    return map[status] || status;
}

function clearFilters() {
    $('filterType').value = '';
    $('filterPlant').value = '';
    $('filterCycle').value = '';
    $('filterTray').value = '';
    $('filterDateFrom').value = '';
    $('filterDateTo').value = '';
    filter = { type: '', plant: '', cycle: '', tray: '', dateFrom: '', dateTo: '' };
    render();
}

$('filterType').addEventListener('change', e => { filter.type = e.target.value; render(); });
$('filterPlant').addEventListener('change', e => { filter.plant = e.target.value; render(); });
$('filterCycle').addEventListener('input', e => { filter.cycle = e.target.value; render(); });
$('filterTray').addEventListener('input', e => { filter.tray = e.target.value; render(); });
$('filterDateFrom').addEventListener('change', e => { filter.dateFrom = e.target.value; render(); });
$('filterDateTo').addEventListener('change', e => { filter.dateTo = e.target.value; render(); });

// Advanced Report
function renderAdvancedReport() {
    const report = {
        summary: {},
        byPlant: {},
        metrics: {}
    };
    
    report.summary = {
        totalRecords: db.length,
        activeSeeds: db.filter(r => r.type === 'seed' && r.status === 'active').length,
        activeHydro: db.filter(r => r.type === 'hydro' && r.status === 'active').length,
        germinated: db.filter(r => r.type === 'seed' && r.germDate).length,
        harvested: db.filter(r => r.status === 'harvested').length,
        destroyed: db.filter(r => r.status === 'destroyed').length,
        waterReadings: db.filter(r => r.type === 'water').length,
        calibrations: db.filter(r => r.type === 'calibration').length
    };
    
    db.filter(r => r.plant).forEach(r => {
        if (!report.byPlant[r.plant]) {
            report.byPlant[r.plant] = {
                total: 0,
                active: 0,
                germinated: 0,
                harvested: 0,
                destroyed: 0
            };
        }
        
        report.byPlant[r.plant].total++;
        if (r.status === 'active') report.byPlant[r.plant].active++;
        if (r.germDate) report.byPlant[r.plant].germinated++;
        if (r.status === 'harvested') report.byPlant[r.plant].harvested++;
        if (r.status === 'destroyed') report.byPlant[r.plant].destroyed++;
    });
    
    const seedsWithGermTarget = db.filter(r => r.type === 'seed' && r.germExpected);
    const onTimeGerm = seedsWithGermTarget.filter(r => {
        if (!r.germDate) return false;
        return new Date(r.germDate) <= new Date(r.germExpected);
    }).length;
    
    report.metrics.germinationSuccessRate = seedsWithGermTarget.length > 0
        ? ((onTimeGerm / seedsWithGermTarget.length) * 100).toFixed(1) + '%'
        : 'N/A';
    
    const germinatedSeeds = db.filter(r => r.type === 'seed' && r.germDate && r.date);
    if (germinatedSeeds.length > 0) {
        const totalDays = germinatedSeeds.reduce((sum, r) => {
            const sow = new Date(r.date);
            const germ = new Date(r.germDate);
            return sum + Math.floor((germ - sow) / (1000 * 60 * 60 * 24));
        }, 0);
        report.metrics.avgGerminationDays = (totalDays / germinatedSeeds.length).toFixed(1);
    } else {
        report.metrics.avgGerminationDays = 'N/A';
    }
    
    const thirtyDaysAgo = new Date();
    thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
    
    const recentWater = db.filter(r => 
        r.type === 'water' && 
        new Date(r.date) >= thirtyDaysAgo
    );
    
    if (recentWater.length > 0) {
        report.metrics.avgPH = (recentWater.reduce((sum, r) => sum + r.ph, 0) / recentWater.length).toFixed(2);
        report.metrics.avgEC = (recentWater.reduce((sum, r) => sum + r.ec, 0) / recentWater.length).toFixed(2);
        report.metrics.avgTemp = (recentWater.reduce((sum, r) => sum + r.temp, 0) / recentWater.length).toFixed(1);
        report.metrics.avgDO = (recentWater.reduce((sum, r) => sum + r.doVal, 0) / recentWater.length).toFixed(1);
    } else {
        report.metrics.avgPH = 'N/A';
        report.metrics.avgEC = 'N/A';
        report.metrics.avgTemp = 'N/A';
        report.metrics.avgDO = 'N/A';
    }
    
    let plantTableRows = '';
    Object.entries(report.byPlant).forEach(([plant, stats]) => {
        plantTableRows += `
            <tr>
                <td>${plant}</td>
                <td>${stats.total}</td>
                <td>${stats.active}</td>
                <td>${stats.germinated}</td>
                <td>${stats.harvested}</td>
                <td>${stats.destroyed}</td>
            </tr>
        `;
    });
    
    const advancedReportHTML = `
        <div class="report-section">
            <h3>📊 סיכום כללי</h3>
            <table class="data-table">
                <tr><td>סה"כ רשומות:</td><td>${report.summary.totalRecords}</td></tr>
                <tr><td>זריעה פעילה:</td><td>${report.summary.activeSeeds}</td></tr>
                <tr><td>הידרו פעיל:</td><td>${report.summary.activeHydro}</td></tr>
                <tr><td>נקטפו:</td><td>${report.summary.harvested}</td></tr>
                <tr><td>הושמדו:</td><td>${report.summary.destroyed}</td></tr>
                <tr><td>מדידות מים:</td><td>${report.summary.waterReadings}</td></tr>
                <tr><td>כיולים:</td><td>${report.summary.calibrations}</td></tr>
            </table>
        </div>
        
        <div class="report-section" style="margin-top: 20px;">
            <h3>📈 מדדי ביצועים</h3>
            <table class="data-table">
                <tr><td>אחוז הצלחת נביטה:</td><td>${report.metrics.germinationSuccessRate}</td></tr>
                <tr><td>ממוצע ימי נביטה:</td><td>${report.metrics.avgGerminationDays}</td></tr>
                <tr><td>pH ממוצע (30 ימים):</td><td>${report.metrics.avgPH}</td></tr>
                <tr><td>EC ממוצע (30 ימים):</td><td>${report.metrics.avgEC}</td></tr>
                <tr><td>טמפרטורה ממוצעת (30 ימים):</td><td>${report.metrics.avgTemp}°C</td></tr>
                <tr><td>DO ממוצע (30 ימים):</td><td>${report.metrics.avgDO}%</td></tr>
            </table>
        </div>
        
        <div class="report-section" style="margin-top: 20px;">
            <h3>🌿 פילוח לפי צמח</h3>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>צמח</th>
                        <th>סה"כ</th>
                        <th>פעיל</th>
                        <th>נבט</th>
                        <th>נקטף</th>
                        <th>הושמד</th>
                    </tr>
                </thead>
                <tbody>
                    ${plantTableRows || '<tr><td colspan="6" style="text-align:center;">אין נתונים</td></tr>'}
                </tbody>
            </table>
        </div>
    `;
    
    $('reportContent').innerHTML = advancedReportHTML;
}

// Excel Export
async function exportToExcel() {
    const wb = XLSX.utils.book_new();
    
    const wsData = [
        ['תאריך', 'סוג', 'צמח', 'מחזור', 'מיקום', 'סטטוס', 'נביטה', 'pH', 'EC', 'DO', 'טמפ', 'הערות']
    ];
    
    db.forEach(r => {
        let location = '-';
        if (r.tray && r.hole) location = `${r.tray} #${r.hole}`;
        else if (r.cycle && r.side && r.hole) location = `${r.cycle} צד${r.side} #${r.hole}`;
        
        wsData.push([
            r.date || '-',
            translateType(r.type),
            r.plant || '-',
            r.cycle || '-',
            location,
            translateStatus(r.status),
            r.germDate || '-',
            r.ph || '-',
            r.ec || '-',
            r.doVal || '-',
            r.temp || '-',
            r.notes || '-'
        ]);
    });
    
    const ws = XLSX.utils.aoa_to_sheet(wsData);
    XLSX.utils.book_append_sheet(wb, ws, 'נתונים');
    
    const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    const blob = new Blob([wbout], { type: 'application/octet-stream' });
    
    const zip = new JSZip();
    zip.file('grow_data.xlsx', blob);
    
    // Add images
    const images = db.filter(r => r.image);
    images.forEach((r, i) => {
        const imgData = r.image.split(',')[1];
        zip.file(`image_${i + 1}.jpg`, imgData, { base64: true });
    });
    
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(zipBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `GrowManager_${new Date().toISOString().split('T')[0]}.zip`;
    a.click();
    
    showToast('✅ ייצוא הושלם', 'success');
}

// Backup & Restore
function downloadBackup() {
    const backup = {
        version: '1.0',
        timestamp: new Date().toISOString(),
        data: db,
        settings: growSettings
    };
    
    const json = JSON.stringify(backup, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `GrowManager_Backup_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    
    showToast('✅ גיבוי הורד', 'success');
}

function restoreBackup(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const backup = JSON.parse(e.target.result);
            
            if (!confirm('⚠️ שחזור יחליף את כל הנתונים הנוכחיים. להמשיך?')) {
                return;
            }
            
            db = backup.data || [];
            growSettings = backup.settings || growSettings;
            
            saveLS();
            syncToFirestore();
            localStorage.setItem('growSettings', JSON.stringify(growSettings));
            
            render();
            loadSettings();
            
            showToast('✅ שחזור הושלם', 'success');
        } catch (err) {
            showToast('❌ שגיאה בקריאת קובץ הגיבוי', 'error');
        }
    };
    reader.readAsText(file);
}

function clearAllData() {
    const confirmation = prompt('⚠️ מחיקה תמחק את כל הנתונים!\nהקלד "מחק הכל" לאישור:');
    if (confirmation !== 'מחק הכל') {
        showToast('❌ מחיקה בוטלה', 'info');
        return;
    }
    
    db = [];
    saveLS();
    syncToFirestore();
    render();
    showToast('✅ כל הנתונים נמחקו', 'warning');
}

// Utilities
function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.remove();
    }, 3000);
}

function readFileAsBase64(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.readAsDataURL(file);
    });
}

function showImage(base64) {
    $('modalImage').src = base64;
    $('imageModal').classList.add('active');
}

function closeImageModal() {
    $('imageModal').classList.remove('active');
}

document.addEventListener('DOMContentLoaded', () => {
    $('seedDate').value = new Date().toISOString().split('T')[0];
    $('hydroDate').value = new Date().toISOString().split('T')[0];
    $('waterDate').value = new Date().toISOString().split('T')[0];
    $('calibrationDate').value = new Date().toISOString().split('T')[0];
    
    updateSubstrateLabels();
});
